<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WETHUS | 프로필</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="index.html" class="wordmark">WETHUS</a>
      <nav class="nav-links">
        <a href="explore.html" class="nav-link">탐색</a>
        <a href="founder.html" class="nav-link">프로젝트 시작하기</a>
        <a href="mentor.html" class="nav-link">멘토</a>
        <a href="profile.html" class="nav-link nav-link--cta">프로필</a>
        <a href="login.html" class="nav-link js-auth-link">로그인</a>
      </nav>
    </div>
  </header>

  <main class="container page-main page-main--profile">
    <section class="page-header">
      <h1 class="page-title">내 프로필</h1>
      <p class="page-sub">프로필, 인증 상태, 프로젝트 활동</p>
    </section>

    <section class="profile-hero" id="profileHero"></section>

    <section class="projects-head-row" style="margin-top:8px;">
      <h2 class="section-title" style="font-size:1.4rem;margin:0;">내 프로젝트</h2>
      <a class="btn btn--primary" href="founder.html">+ 프로젝트 추가</a>
    </section>

    <section id="myProjects" class="list-grid"></section>

    <section class="projects-head-row" style="margin-top:4px;">
      <h2 class="section-title" style="font-size:1.4rem;margin:0;">참여중인 프로젝트</h2>
    </section>
    <section id="participatingProjects" class="list-grid"></section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <span class="wordmark">WETHUS</span>
        <p class="footer-copy">Built for real youth project execution · Developer <a href="mailto:anseokkim@gmail.com">anseokkim@gmail.com</a></p>
      </div>
    </div>
  </footer>

  <div id="profileEditModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-profile="true"></div>
    <article class="modal-panel" style="max-width:560px;">
      <button class="modal-close" id="profileEditClose" aria-label="닫기">×</button>
      <div class="modal-content">
        <h3 style="margin:0 0 12px;">프로필 수정</h3>
        <form id="profileForm" class="application-form">
          <label>이름 <input name="name" required /></label>
          <label>별명 <input name="nickname" required /></label>
          <label>자기소개 <textarea name="bio" placeholder="어떤 프로젝트를 왜 하는지 간단히 소개해보세요."></textarea></label>
          <label>나이 <input name="age" type="number" min="10" max="30" placeholder="만 나이" required /></label>
          <label>학교 정보
            <div style="display:flex;gap:8px;">
              <input id="schoolInput" name="school" placeholder="학교명 검색" />
              <button id="schoolSearchBtn" class="btn btn--secondary" type="button">검색</button>
            </div>
          </label>
          <label>경력사항(나열)
            <textarea id="careerRaw" name="careerRaw" placeholder="예: 영화제 출품 2회, React 앱 제작, 동아리 회장"></textarea>
          </label>
          <label>경력 요약(AI 정리)
            <div style="display:flex;gap:8px;align-items:flex-start;">
              <textarea id="careerSummary" name="careerSummary" placeholder="AI가 두괄식으로 요약합니다."></textarea>
              <button id="careerAiBtn" class="btn btn--secondary" type="button">AI 정리</button>
            </div>
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-weight:600;"><input type="checkbox" id="under22Confirm" name="under22Confirm" style="width:auto;"/> 만 22세 미만 학생임을 확인합니다. (PASS 연동 전 임시)</label>
          <label style="display:flex;align-items:center;gap:8px;font-weight:600;"><input type="checkbox" name="founderVerified" style="width:auto;"/> Founder 인증서 보유(개발용)</label>
          <div style="display:flex;justify-content:flex-end;gap:8px;">
            <button class="btn btn--secondary" type="button" id="profileEditCancel">취소</button>
            <button class="btn btn--primary" type="submit">저장</button>
          </div>
        </form>
        <p id="profileMsg" class="form-message"></p>
      </div>
    </article>
  </div>

  <script src="app.js?v=20260318-3"></script>
  <script>
    const authLink = document.querySelector('.js-auth-link');

    try {
      WETHUS.requireAuth();
      const st = WETHUS.getState();
      if (authLink && (st.currentUserId || st.devMode)) {
        authLink.textContent = '로그아웃';
        authLink.href = '#';
        authLink.addEventListener('click', (e) => { e.preventDefault(); WETHUS.logout(); location.href='login.html'; });
      }

      const u = WETHUS.currentUser();
      const hero = document.getElementById('profileHero');
      const mine = document.getElementById('myProjects');
      const participatingEl = document.getElementById('participatingProjects');
      const profileEditModal = document.getElementById('profileEditModal');
      const profileEditClose = document.getElementById('profileEditClose');
      const profileEditCancel = document.getElementById('profileEditCancel');

      const fallbackUser = { name: '개발자 모드', nickname: 'dev_mode', email: 'dev@local', bio: '임시 세션으로 로그인됨', founderVerified: false, profileImage: '', age: 17, school: '', careerRaw: '', careerSummary: '', onboardingComplete: true };
      const user = u || fallbackUser;
      const founderBadge = user.founderVerified ? '<span class="verify-badge">Founder 인증</span>' : '';

      hero.innerHTML = `
        <div class="profile-avatar">${(user.name || 'U').slice(0,1)}</div>
        <div class="profile-main">
          <div class="profile-topline">
            <h2>${user.name}</h2>
            <span class="profile-nickname">@${user.nickname || (user.name || '').replace(/\s+/g,'').toLowerCase()}</span>
            ${founderBadge}
          </div>
          <p class="profile-bio">${user.bio || '아직 소개가 없습니다. 프로젝트를 시작해보세요.'}</p>
          <p class="meta" style="margin:0 0 6px;">${user.school ? user.school + ' · ' : ''}${user.age ? '만 ' + user.age + '세' : ''}</p>
          <div class="profile-stats">
            <span><strong>${WETHUS.myProjects().length}</strong> 프로젝트</span>
            <span><strong>${WETHUS.listProjects().filter(p => p.founderId === (u ? u.id : 'dev-temp')).length}</strong> 등록</span>
            <span><strong>${u ? '일반' : '개발'}</strong> 모드</span>
          </div>
        </div>
        ${u ? '<button id="profileEditOpen" class="btn btn--secondary" style="margin-left:auto;display:inline-flex;align-items:center;gap:6px;">✎ 수정</button>' : ''}
      `;

      if (u) {
        const profileForm = document.getElementById('profileForm');
        const profileMsg = document.getElementById('profileMsg');
        const profileEditOpen = document.getElementById('profileEditOpen');
        const schoolInput = document.getElementById('schoolInput');
        const schoolSearchBtn = document.getElementById('schoolSearchBtn');
        const careerRawEl = document.getElementById('careerRaw');
        const careerSummaryEl = document.getElementById('careerSummary');
        const careerAiBtn = document.getElementById('careerAiBtn');
        const under22Confirm = document.getElementById('under22Confirm');
        const ONBOARDING = new URLSearchParams(location.search).get('onboarding') === '1' || !u.onboardingComplete;
        const NEIS_KEY = '5c4d13bf833b45ec8c97f9f0fe885d6b';

        function fillProfileForm(force = false) {
          profileForm.elements.name.value = u.name || '';
          profileForm.elements.nickname.value = u.nickname || '';
          profileForm.elements.bio.value = u.bio || '';
          profileForm.elements.age.value = u.age || '';
          profileForm.elements.school.value = u.school || '';
          profileForm.elements.careerRaw.value = u.careerRaw || '';
          profileForm.elements.careerSummary.value = u.careerSummary || '';
          profileForm.elements.founderVerified.checked = !!u.founderVerified;
          under22Confirm.checked = !!u.onboardingComplete;
          profileMsg.textContent = force ? '초기 프로필 설정을 완료해주세요.' : '';
        }

        function openProfileEdit(force = false) {
          fillProfileForm(force);
          profileEditModal.classList.add('open');
          profileEditModal.setAttribute('aria-hidden', 'false');
          document.body.style.overflow = 'hidden';
        }

        function closeProfileEdit() {
          profileEditModal.classList.remove('open');
          profileEditModal.setAttribute('aria-hidden', 'true');
          document.body.style.overflow = '';
        }

        schoolSearchBtn.addEventListener('click', () => {
          const q = (schoolInput.value || '').trim();
          const url = `https://open.neis.go.kr/hub/schoolInfo?KEY=${NEIS_KEY}&Type=json${q ? `&SCHUL_NM=${encodeURIComponent(q)}` : ''}`;
          window.open(url, 'neisSchoolSearch', 'width=900,height=720');
          profileMsg.textContent = '새 창에서 학교 검색 결과를 확인하고 학교명을 입력해 저장해주세요.';
        });

        careerAiBtn.addEventListener('click', async () => {
          const raw = (careerRawEl.value || '').trim();
          if (!raw) { profileMsg.textContent = '경력사항을 먼저 입력해주세요.'; return; }
          try {
            const out = await WETHUS.askGemini(`다음 경력사항을 두괄식으로 3개 항목으로 나눠 한국어로 요약해줘. 각 항목은 '핵심역량: 내용' 형태.\n${raw}`);
            careerSummaryEl.value = out;
          } catch {
            const chunks = raw.split(/[,\n]/).map(s => s.trim()).filter(Boolean).slice(0, 6);
            careerSummaryEl.value = [
              `핵심역량: ${chunks.slice(0,2).join(' · ') || '프로젝트 실행 경험'}`,
              `협업경험: ${chunks.slice(2,4).join(' · ') || '팀 기반 협업 및 커뮤니케이션'}`,
              `실행성과: ${chunks.slice(4,6).join(' · ') || '지속적인 실행과 개선 경험'}`
            ].join('\n');
            profileMsg.textContent = 'AI 연결이 불안정해 임시 요약을 생성했습니다.';
          }
        });

        profileEditOpen?.addEventListener('click', () => openProfileEdit(false));
        profileEditClose?.addEventListener('click', () => { if (!ONBOARDING) closeProfileEdit(); });
        profileEditCancel?.addEventListener('click', () => { if (!ONBOARDING) closeProfileEdit(); });
        profileEditModal?.addEventListener('click', (e) => {
          if (!ONBOARDING && e.target && e.target.getAttribute('data-close-profile') === 'true') closeProfileEdit();
        });

        if (ONBOARDING) {
          // 팝업 대신 전체 페이지 온보딩 폼으로 전환
          fillProfileForm(true);
          const onboardingSection = document.createElement('section');
          onboardingSection.className = 'profile-card';
          onboardingSection.innerHTML = `
            <h2 style="margin:0 0 8px;font-size:1.35rem;">초기 프로필 설정</h2>
            <p class="page-sub" style="margin:0 0 14px;">홈으로 이동하기 전에 프로필 정보를 먼저 설정해주세요.</p>
          `;

          const pageHeader = document.querySelector('.page-header');
          pageHeader?.insertAdjacentElement('afterend', onboardingSection);
          onboardingSection.appendChild(profileForm);
          onboardingSection.appendChild(profileMsg);

          hero.style.display = 'none';
          document.querySelectorAll('.projects-head-row, #myProjects, #participatingProjects').forEach(el => el.style.display = 'none');
          profileEditModal.remove();
          const cancelBtn = document.getElementById('profileEditCancel');
          if (cancelBtn) cancelBtn.style.display = 'none';
        }

        profileForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const age = Number(fd.get('age') || 0);
          if (!age || age >= 22) {
            profileMsg.textContent = '현재는 만 22세 미만 학생만 가입 가능합니다.';
            return;
          }
          if (!under22Confirm.checked) {
            profileMsg.textContent = '학생/연령 확인에 동의해주세요.';
            return;
          }
          WETHUS.updateCurrentUserProfile({
            name: fd.get('name'),
            nickname: fd.get('nickname'),
            bio: fd.get('bio'),
            age,
            school: fd.get('school'),
            careerRaw: fd.get('careerRaw'),
            careerSummary: fd.get('careerSummary'),
            founderVerified: fd.get('founderVerified') === 'on',
            onboardingComplete: true
          });
          closeProfileEdit();
          location.href = 'index.html';
        });

      }

      const list = WETHUS.myProjects();
      mine.innerHTML = list.length ? list.map(p => `
        <article class="list-item">
          <h3>${p.title}</h3>
          <p>${p.summary}</p>
          <div class="meta"><span class="badge">${p.category}</span> · ${p.status} · ${p.teamSize || ''} · ${p.duration || ''}</div>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
            <select class="project-status-select" data-id="${p.id}" style="background:#0d0d0d;color:#f5f5f5;border:1px solid #2a2a2a;padding:8px;border-radius:8px;">
              ${['모집 중','기획 중','진행 중','피보팅'].map(s => `<option ${p.status===s?'selected':''}>${s}</option>`).join('')}
            </select>
            <select class="project-size-select" data-id="${p.id}" style="background:#0d0d0d;color:#f5f5f5;border:1px solid #2a2a2a;padding:8px;border-radius:8px;">
              ${['1인','2인','3인','4인이상'].map(s => `<option ${p.teamSize===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>
        </article>
      `).join('') : '<article class="list-item"><h3>프로젝트 없음</h3><p>아직 등록한 프로젝트가 없습니다. + 프로젝트 추가를 눌러 시작해보세요.</p></article>';

      document.querySelectorAll('.project-status-select').forEach(sel => {
        sel.addEventListener('change', () => {
          WETHUS.updateProject(sel.dataset.id, { status: sel.value });
        });
      });
      document.querySelectorAll('.project-size-select').forEach(sel => {
        sel.addEventListener('change', () => {
          WETHUS.updateProject(sel.dataset.id, { teamSize: sel.value });
        });
      });

      const participating = WETHUS.myParticipatingProjects();
      participatingEl.innerHTML = participating.length ? participating.map(p => `
        <article class="list-item">
          <span class="card-chip">${p.category || ''}</span>
          <h3>${p.title}</h3>
          <p>${p.summary}</p>
          <div class="meta">${p.status || ''} · ${p.teamSize || ''}</div>
          <div style="display:flex;justify-content:flex-end;margin-top:8px;">
            <button class="apply-btn applied cancel-apply" data-project="${p.id}">지원취소</button>
          </div>
        </article>
      `).join('') : '<article class="list-item"><p class="page-sub">참여중인 프로젝트가 없습니다.</p></article>';

      participatingEl.querySelectorAll('.cancel-apply').forEach(btn => {
        btn.addEventListener('click', async () => {
          const ok = await WETHUS.uiConfirm('지원을 취소하겠습니까?', { title: '지원 취소' });
          if (!ok) return;
          WETHUS.cancelApplication(btn.dataset.project);
          const card = btn.closest('.list-item');
          if (card) card.remove();
          if (!participatingEl.querySelector('.list-item')) {
            participatingEl.innerHTML = '<article class="list-item"><p class="page-sub">참여중인 프로젝트가 없습니다.</p></article>';
          }
        });
      });
    } catch (err) {
      console.error(err);
    }
  </script>
</body>
</html>
