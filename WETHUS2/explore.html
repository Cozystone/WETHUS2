<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WETHUS | 탐색</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="index.html" class="wordmark">WETHUS</a>
      <nav class="nav-links">
        <a href="explore.html" class="nav-link nav-link--cta">탐색</a>
        <a href="founder.html" class="nav-link">프로젝트 시작하기</a>
        <a href="mentor.html" class="nav-link">멘토</a>
        <a href="profile.html" class="nav-link">프로필</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-header">
      <h1 class="page-title">프로젝트 탐색</h1>
      <p class="page-sub">지금 합류 가능한 팀을 빠르게 찾으세요.</p>
    </section>

    <section class="search-wrap">
      <div class="search-row" style="position:relative;">
        <input id="q" placeholder="어떤 프로젝트를 찾고 있나요?" style="padding-left:42px;" />
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8a8a8a;">⌕</span>
        <button id="searchBtn" class="btn btn--primary">검색</button>
      </div>

      <div class="search-subrow">
        <div id="categoryChips" class="hero-tags" style="margin:2px 0 0;"></div>
        <div class="view-toggle" role="group" aria-label="보기 전환">
          <button id="viewList" class="view-icon-btn active" title="리스트형" aria-label="리스트형">
            <span class="icon-list"></span>
          </button>
          <button id="viewAlbum" class="view-icon-btn" title="앨범형" aria-label="앨범형">
            <span class="icon-grid"></span>
          </button>
          <button id="shuffleBtn" class="view-icon-btn" title="셔플" aria-label="셔플">
            <span class="icon-shuffle"></span>
          </button>
          <button id="filterBtn" class="view-icon-btn view-icon-btn--filter" title="필터" aria-label="필터">
            <span class="icon-filter"></span>
          </button>
        </div>
      </div>

      <div id="filterPanel" class="filter-panel" style="display:none;">
        <label>인원
          <select id="teamSizeFilter">
            <option value="">전체</option>
            <option>1인</option><option>2인</option><option>3인</option><option>4인이상</option>
          </select>
        </label>
        <label>단계
          <select id="stageFilter">
            <option value="">전체</option>
            <option>모집 중</option><option>기획 중</option><option>진행 중</option><option>피보팅</option>
          </select>
        </label>
        <button id="resetFilter" class="btn btn--secondary" type="button">초기화</button>
      </div>

      <article id="aiResult" class="list-item" style="display:none;"></article>
    </section>

    <section id="list" class="list-grid"></section>
  </main>

  <div id="projectModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <article class="modal-panel">
      <button class="modal-close" id="modalClose" aria-label="닫기">×</button>
      <div class="modal-media-wrap"><img id="modalImage" class="modal-image" alt="프로젝트 이미지" /></div>
      <div class="modal-content">
        <p class="section-kicker" id="modalCategory">CATEGORY</p>
        <h3 id="modalTitle" style="margin:0 0 10px;font-size:1.45rem;font-weight:800;"></h3>
        <p id="modalSummary" style="margin:0 0 12px;color:#f5f5f5;"></p>
        <p id="modalDesc" style="margin:0 0 18px;color:#a3a3a3;line-height:1.7;white-space:pre-line;"></p>
        <div id="modalTeam" class="team-row" style="margin-bottom:12px;"></div>
        <div class="meta"><span class="badge" id="modalCategoryBadge"></span> · <span id="modalStatus"></span> · <span id="modalRoles"></span> · <span id="modalDuration"></span></div>
        <div class="modal-social-row">
          <button id="modalLikeBtn" class="btn btn--secondary">♡ <span id="modalLikeCount">0</span></button>
          <button id="modalCommentBtn" class="btn btn--secondary">💬 <span id="modalCommentCount">0</span></button>
        </div>
        <div id="modalCommentPanel" class="comment-panel" style="display:none;">
          <div class="comment-panel-head">
            <strong>댓글</strong>
            <button id="modalCommentClose" class="comment-close" type="button">×</button>
          </div>
          <div id="modalComments" class="modal-comments"></div>
          <form id="modalCommentForm" class="modal-comment-form">
            <input id="modalCommentInput" placeholder="댓글을 입력하세요" />
            <button class="btn btn--primary" type="submit">등록</button>
          </form>
        </div>
      </div>
    </article>
  </div>

  
  <script src="app.js"></script>
  <script>
    WETHUS.requireAuth();
    const authLink = document.querySelector('.js-auth-link');
    const st = WETHUS.getState();
    if (authLink && (st.currentUserId || st.devMode)) {
      authLink.textContent = '로그아웃';
      authLink.href = '#';
      authLink.addEventListener('click', (e) => { e.preventDefault(); WETHUS.logout(); location.href='login.html'; });
    }

    const listEl = document.getElementById('list');
    const q = document.getElementById('q');
    const aiResultEl = document.getElementById('aiResult');
    const viewListBtn = document.getElementById('viewList');
    const viewAlbumBtn = document.getElementById('viewAlbum');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const filterBtn = document.getElementById('filterBtn');
    const filterPanel = document.getElementById('filterPanel');
    const teamSizeFilter = document.getElementById('teamSizeFilter');
    const stageFilter = document.getElementById('stageFilter');
    const resetFilter = document.getElementById('resetFilter');
    const categoryChips = document.getElementById('categoryChips');

    const allProjects = WETHUS.listProjects().slice();
    let currentItems = allProjects.slice();
    let viewMode = localStorage.getItem('wethus_explore_view') || 'list';
    let selectedCategory = null;

    function normalizeStage(v) {
      const s = String(v || '').replace(/\s+/g,'');
      if (s === '모집중' || s === '구인중') return '모집 중';
      if (s === '팀빌딩' || s === '기획중' || s === '초기팀빌딩' || s === '검토대기') return '기획 중';
      if (s === '진행중') return '진행 중';
      if (s === '피보팅') return '피보팅';
      return '기획 중';
    }

    function imageFor(project, idx) {
      if (project.image) return project.image;
      const key = (project.category || 'project').toLowerCase();
      return `https://picsum.photos/seed/wethus-${key}-${idx}/900/560`;
    }

    const memberHref = (m) => `member.html?name=${encodeURIComponent(m?.name||'팀원')}&role=${encodeURIComponent(m?.role||'담당')}&bio=${encodeURIComponent(m?.bio||'소개가 아직 없습니다.')}`;
    function renderTeam(team=[]) {
      const leader = team.find(m => m.isLeader) || team[0];
      const others = team.filter(m => m !== leader);
      const visible = others.slice(0,2);
      const hidden = others.slice(2);
      return `
        <div class="team-row">
          <a class="member-pill leader" href="${memberHref(leader)}">${leader?.name || '대표'} 대표</a>
          ${visible.map(m => `<a class="member-pill" href="${memberHref(m)}">${m.name} ${m.role||''}</a>`).join('')}
          ${hidden.length ? `<button class="team-toggle">팀원 ${hidden.length+1}명</button><div class="team-list">${hidden.map(m=>`<a class="member-pill block" href="${memberHref(m)}">${m.name} ${m.role||''}</a>`).join('')}</div>` : ''}
        </div>`;
    }

    function renderList(items) {
      listEl.className = 'list-grid';
      listEl.innerHTML = items.map(p => {
        const stage = normalizeStage(p.status);
        const item = { ...p, status: stage };
        return `
        <article class="list-item" data-project='${JSON.stringify(item).replace(/'/g, "&#39;")}'>
          <span class="badge">${p.category}</span>
          <h3>${p.title}</h3>
          <p>${p.summary}</p>
          ${renderTeam(p.teamMembers)}
          <div class="meta">${stage} · ${p.teamSize || ''} · 필요역할: ${p.roles}</div>
          <div class="card-social"><span>♡ ${p.likes || 0}</span><span>💬 ${(p.comments || []).length}</span></div>
        </article>
      `}).join('');
    }

    function renderAlbum(items) {
      listEl.className = 'project-grid-album';
      listEl.innerHTML = items.map((p, i) => {
        const stage = normalizeStage(p.status);
        const item = { ...p, image: imageFor(p, i), status: stage };
        return `
        <article class="project-tile" data-project='${JSON.stringify(item).replace(/'/g, "&#39;")}'>
          <img src="${item.image}" alt="${p.title}" class="project-tile-img" />
          <div class="project-tile-body">
            <h3>${p.title}</h3>
            <p>${p.summary}</p>
            ${renderTeam(p.teamMembers)}
            <div class="meta"><span class="badge">${p.category}</span> · ${stage} · ${p.teamSize || ''}</div>
            <div class="card-social"><span>♡ ${p.likes || 0}</span><span>💬 ${(p.comments || []).length}</span></div>
          </div>
        </article>
      `}).join('');
    }

    function render(items) {
      currentItems = items;
      if (viewMode === 'album') renderAlbum(items);
      else renderList(items);
      viewListBtn.classList.toggle('active', viewMode === 'list');
      viewAlbumBtn.classList.toggle('active', viewMode === 'album');
    }

    function buildCategoryChips(items) {
      const cats = Array.from(new Set(items.map(p => p.category).filter(Boolean)));
      categoryChips.innerHTML = cats.map(cat => `<button class="chip chip-btn ${selectedCategory===cat?'active':''}" data-cat="${cat}">${cat}</button>`).join('');
      categoryChips.querySelectorAll('.chip-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const cat = btn.dataset.cat;
          selectedCategory = selectedCategory === cat ? null : cat;
          applyFilters();
        });
      });
    }

    function applyFilters() {
      const query = q.value.trim();
      let items = allProjects.slice();

      if (selectedCategory) items = items.filter(p => p.category === selectedCategory);
      if (teamSizeFilter.value) items = items.filter(p => p.teamSize === teamSizeFilter.value);
      if (stageFilter.value) items = items.filter(p => p.status === stageFilter.value);
      if (query) items = WETHUS.fakeAiSearch(items, query);

      buildCategoryChips(allProjects);
      render(items);
      return items;
    }

    async function runSearch() {
      const query = q.value.trim();
      const items = applyFilters();

      if (!query) { aiResultEl.style.display = 'none'; return; }

      aiResultEl.style.display = 'block';
      aiResultEl.innerHTML = '<p>검색 결과를 더 정교하게 분석 중...</p>';

      try {
        const prompt = `다음 프로젝트 목록에서 '${query}'에 가장 맞는 3개를 뽑아 짧게 추천해줘.\n` +
          items.map((p, i) => `${i + 1}. [${p.category}] ${p.title} - ${p.summary} / ${p.roles}`).join('\n') +
          `\n반환 형식: 1) 프로젝트명 - 추천 이유(한 줄)`;
        const text = await WETHUS.askGemini(prompt);
        aiResultEl.innerHTML = `<h3>추천 정리</h3><p style="white-space:pre-wrap;">${text}</p>`;
      } catch (e) {
        aiResultEl.style.display = 'none';
      }
    }

    document.getElementById('searchBtn').addEventListener('click', runSearch);
    q.addEventListener('keydown', (e) => { if (e.key === 'Enter') runSearch(); });

    viewListBtn.addEventListener('click', () => {
      viewMode = 'list';
      localStorage.setItem('wethus_explore_view', viewMode);
      render(currentItems);
    });

    viewAlbumBtn.addEventListener('click', () => {
      viewMode = 'album';
      localStorage.setItem('wethus_explore_view', viewMode);
      render(currentItems);
    });

    shuffleBtn.addEventListener('click', () => {
      const shuffled = currentItems.slice().sort(() => Math.random() - 0.5);
      render(shuffled);
    });

    filterBtn.addEventListener('click', () => {
      filterPanel.style.display = filterPanel.style.display === 'none' ? 'grid' : 'none';
    });
    teamSizeFilter.addEventListener('change', applyFilters);
    stageFilter.addEventListener('change', applyFilters);
    resetFilter.addEventListener('click', () => {
      teamSizeFilter.value = '';
      stageFilter.value = '';
      selectedCategory = null;
      q.value = '';
      aiResultEl.style.display = 'none';
      applyFilters();
    });

    const modal = document.getElementById('projectModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalCategory = document.getElementById('modalCategory');
    const modalSummary = document.getElementById('modalSummary');
    const modalDesc = document.getElementById('modalDesc');
    const modalStatus = document.getElementById('modalStatus');
    const modalCategoryBadge = document.getElementById('modalCategoryBadge');
    const modalRoles = document.getElementById('modalRoles');
    const modalDuration = document.getElementById('modalDuration');
    const modalImage = document.getElementById('modalImage');
    const modalLikeBtn = document.getElementById('modalLikeBtn');
    const modalLikeCount = document.getElementById('modalLikeCount');
    const modalCommentCount = document.getElementById('modalCommentCount');
    const modalCommentBtn = document.getElementById('modalCommentBtn');
    const modalCommentPanel = document.getElementById('modalCommentPanel');
    const modalCommentClose = document.getElementById('modalCommentClose');
    const modalComments = document.getElementById('modalComments');
    const modalCommentForm = document.getElementById('modalCommentForm');
    const modalCommentInput = document.getElementById('modalCommentInput');
    const modalTeam = document.getElementById('modalTeam');
    let currentProjectId = null;

    const memberHref = (m) => `member.html?name=${encodeURIComponent(m?.name||'팀원')}&role=${encodeURIComponent(m?.role||'담당')}&bio=${encodeURIComponent(m?.bio||'소개가 아직 없습니다.')}`;
    function renderTeamMini(team=[]) {
      if (!team.length) { modalTeam.innerHTML = ''; return; }
      const leader = team.find(m => m.isLeader) || team[0];
      const rest = team.filter(m => m !== leader).slice(0, 3);
      modalTeam.innerHTML = `<a class="member-pill leader" href="${memberHref(leader)}">${leader?.name || '대표'} 대표</a>` +
        rest.map(m => `<a class="member-pill" href="${memberHref(m)}">${m.name} ${m.role||''}</a>`).join('');
    }

    function renderComments(comments) {
      if (!comments || !comments.length) {
        modalComments.innerHTML = '<p class="meta">아직 댓글이 없습니다.</p>';
        return;
      }
      modalComments.innerHTML = comments.map(c => `<div class="comment-item"><strong>${c.author || '익명'}</strong><p>${c.text || ''}</p></div>`).join('');
    }

    function openModal(data) {
      modalTitle.textContent = data.title || '';
      modalCategory.textContent = data.category || '';
      modalSummary.textContent = data.summary || '';
      modalDesc.textContent = data.desc || data.fullDescription || '프로젝트 상세 설명이 준비 중입니다.';
      modalStatus.textContent = data.status || '';
      modalCategoryBadge.textContent = data.category || '';
      modalRoles.textContent = data.roles || '';
      modalDuration.textContent = data.duration || '';
      modalImage.src = data.image || imageFor(data, 0);
      renderTeamMini(data.teamMembers || []);
      currentProjectId = data.id || null;
      modalLikeBtn.classList.toggle('liked', !!data._liked);
      modalLikeBtn.innerHTML = (data._liked ? '♥ ' : '♡ ') + '<span id=\"modalLikeCount\">' + (data.likes || 0) + '</span>';
      modalLikeCount.textContent = data.likes || 0;
      modalCommentCount.textContent = (data.comments || []).length;
      renderComments(data.comments || []);
      modalCommentPanel.style.display = 'none';
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }


    listEl.addEventListener('click', (e) => {
      const toggleBtn = e.target.closest('.team-toggle');
      if (toggleBtn) {
        const list = toggleBtn.nextElementSibling;
        if (list) list.classList.toggle('open');
        return;
      }

      const target = e.target.closest('[data-project]');
      if (!target) return;
      if (e.target.closest('.member-pill')) return;
      try {
        const data = JSON.parse(target.getAttribute('data-project'));
        openModal(data);
      } catch (err) {
        console.error(err);
      }
    });

    document.getElementById('modalClose').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target && e.target.getAttribute('data-close') === 'true') closeModal();
    });

    modalLikeBtn.addEventListener('click', () => {
      if (!currentProjectId) return;
      const result = WETHUS.toggleLike(currentProjectId);
      if (!result) return;
      modalLikeBtn.classList.toggle('liked', !!result.liked);
      modalLikeBtn.innerHTML = (result.liked ? '♥ ' : '♡ ') + '<span id=\"modalLikeCount\">' + result.likes + '</span>';
      const target = currentItems.find(p => p.id === currentProjectId);
      if (target) { target.likes = result.likes; target._liked = result.liked; }
    });

    modalCommentBtn.addEventListener('click', () => {
      modalCommentPanel.style.display = 'block';
      modalCommentInput.focus();
    });

    modalCommentClose.addEventListener('click', () => {
      modalCommentPanel.style.display = 'none';
    });

    modalCommentForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!currentProjectId) return;
      const text = (modalCommentInput.value || '').trim();
      if (!text) return;
      const comments = WETHUS.addComment(currentProjectId, text) || [];
      modalCommentInput.value = '';
      modalCommentCount.textContent = comments.length;
      renderComments(comments);
      const target = currentItems.find(p => p.id === currentProjectId);
      if (target) target.comments = comments;
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeModal(); }
    });

    buildCategoryChips(allProjects);
    applyFilters();
  </script>
</body>
</html>
