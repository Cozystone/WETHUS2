<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WETHUS | DM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="index.html" class="wordmark">WETHUS</a>
      <nav class="nav-links">
        <a href="explore.html" class="nav-link">탐색</a>
        <a href="founder.html" class="nav-link">프로젝트 시작하기</a>
        <a href="mentor.html" class="nav-link">멘토</a>
        <a href="profile.html" class="nav-link">프로필</a>
        <a href="login.html" class="nav-link js-auth-link">로그인</a>
      </nav>
    </div>
  </header>

  <main class="container page-main page-main--standard">
    <section class="projects-head-row" style="padding-top:28px;">
      <div>
        <h1 class="page-title" style="margin:0;">DM</h1>
        <p class="page-sub" id="dmPlanDesc">팀과의 소통을 위한 메시지함</p>
      </div>
      <button id="upgradeBtn" class="btn btn--primary" style="display:none;">Premium으로 전환</button>
    </section>

    <section class="profile-card" style="display:grid;grid-template-columns:280px 1fr;gap:14px;">
      <div>
        <h3 style="margin:0 0 8px;">대화 목록</h3>
        <div id="dmThreads" class="list-grid"></div>
      </div>
      <div>
        <h3 id="dmThreadTitle" style="margin:0 0 8px;">대화를 선택하세요</h3>
        <div id="dmMessages" class="list-grid" style="max-height:360px;overflow:auto;"></div>
        <div id="dmComposerWrap" style="margin-top:10px;display:none;">
          <textarea id="dmInput" placeholder="메시지를 입력하세요" style="width:100%;min-height:90px;background:#0d0d0d;color:#f5f5f5;border:1px solid #2a2a2a;border-radius:10px;padding:10px;"></textarea>
          <div style="display:flex;justify-content:flex-end;margin-top:8px;">
            <button id="dmSend" class="btn btn--primary">보내기</button>
          </div>
        </div>
        <p id="dmInfo" class="form-message"></p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <span class="wordmark">WETHUS</span>
        <p class="footer-copy">Built for real youth project execution · Developer <a href="mailto:anseokkim@gmail.com">anseokkim@gmail.com</a><br/>Copyright © WETHUS. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="app.js?v=20260318-20"></script>
  <script>
    const authLink = document.querySelector('.js-auth-link');
    const st = WETHUS.getState();
    if (authLink && (st.currentUserId || st.devMode)) {
      authLink.textContent = '로그아웃';
      authLink.href = '#';
      authLink.addEventListener('click', (e) => { e.preventDefault(); WETHUS.logout(); location.href='login.html'; });
    }

    WETHUS.requireAuth();

    const threadEl = document.getElementById('dmThreads');
    const msgEl = document.getElementById('dmMessages');
    const titleEl = document.getElementById('dmThreadTitle');
    const planDesc = document.getElementById('dmPlanDesc');
    const upgradeBtn = document.getElementById('upgradeBtn');
    const composerWrap = document.getElementById('dmComposerWrap');
    const dmInfo = document.getElementById('dmInfo');

    let currentThreadId = null;

    function renderThreads() {
      const threads = WETHUS.listDmThreads();
      threadEl.innerHTML = threads.map(t => `<article class="list-item" data-id="${t.id}"><h3 style="margin:0 0 4px;">${t.targetName}</h3><p class="meta">${(t.messages||[]).length}개 메시지</p></article>`).join('');
      threadEl.querySelectorAll('.list-item').forEach(el => {
        el.addEventListener('click', () => {
          currentThreadId = el.getAttribute('data-id');
          renderMessages();
        });
      });
      if (!currentThreadId && threads[0]) {
        currentThreadId = threads[0].id;
        renderMessages();
      }
    }

    function renderMessages() {
      const threads = WETHUS.listDmThreads();
      const t = threads.find(x => x.id === currentThreadId);
      if (!t) { msgEl.innerHTML = ''; return; }
      titleEl.textContent = t.targetName;
      const msgs = WETHUS.listDmMessages(t.id);
      msgEl.innerHTML = msgs.map(m => `<article class="list-item"><p style="margin:0 0 4px;"><strong>${m.from}</strong></p><p style="margin:0;">${m.text}</p></article>`).join('');
    }

    function applyPlanUi() {
      const isPremium = WETHUS.currentPlan() === 'premium';
      if (isPremium) {
        planDesc.textContent = 'Premium 플랜: DM 수신/발신 모두 사용 가능';
        composerWrap.style.display = 'block';
        upgradeBtn.style.display = 'none';
        dmInfo.textContent = '';
      } else {
        planDesc.textContent = 'Free 플랜: DM 수신만 가능 (발신은 Premium)';
        composerWrap.style.display = 'none';
        upgradeBtn.style.display = 'inline-flex';
        dmInfo.textContent = '프리 플랜에서는 메시지 발신이 잠겨 있습니다.';
      }
    }

    upgradeBtn.addEventListener('click', () => {
      WETHUS.setCurrentUserPlan('premium');
      applyPlanUi();
    });

    document.getElementById('dmSend').addEventListener('click', () => {
      const text = (document.getElementById('dmInput').value || '').trim();
      if (!text || !currentThreadId) return;
      try {
        WETHUS.sendDm(currentThreadId, text);
        document.getElementById('dmInput').value = '';
        renderMessages();
      } catch (e) {
        dmInfo.textContent = e.message;
      }
    });

    renderThreads();
    applyPlanUi();
  </script>
</body>
</html>
