  <style>
    :root {
      --theme-tint: #ffb27a;
      --theme-tint-2: #ff8f45;
    }
    .theme-shell::before {
      content: ""; position: fixed; inset: 0; pointer-events:none;
      background:
        radial-gradient(1180px 450px at 18% -8%, color-mix(in srgb, var(--theme-tint) 64%, transparent), transparent 72%),
        radial-gradient(980px 390px at 88% 110%, color-mix(in srgb, var(--theme-tint-2) 50%, transparent), transparent 70%);
      z-index: -1;
    }
    .theme-shell .search-wrap,
    .theme-shell .list-item,
    .theme-shell .project-tile {
      border-color: rgba(255,255,255,.16) !important;
      box-shadow: 0 10px 24px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.12);
    }
    .theme-shell .list-item:hover,
    .theme-shell .project-tile:hover {
      border-color: rgba(255,255,255,.28) !important;
    }
    #list.list-grid, #list.project-cards { min-height: 760px; }
    #list.project-cards { align-items: start; }
    #list .card-summary, #list .mini-summary {
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 1.45em;
      max-width: 100%;
      word-break: keep-all;
    }
    .modal-panel { max-width: 920px; }
    .modal-content { padding: 14px 16px 16px; }
    .modal-summary-wrap {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
      padding: 0 6px;
    }
    .modal-kv {
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 10px 12px;
      background: #141414;
    }
    .modal-kv p { margin: 0; }
    .mentor-stack { display:grid; gap:8px; margin:8px 0 12px; }
    .mentor-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:8px 0 6px; }
    .mentor-tabs { display:flex; gap:6px; }
    .mentor-tab { padding:5px 10px; border:1px solid #3a3a3a; border-radius:999px; background:#141414; color:#ddd; font-size:.78rem; cursor:pointer; }
    .mentor-tab.active { background:#f5f5f5; color:#111; border-color:#f5f5f5; }
    .mentor-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border:1px solid #2c2c2c; border-radius:10px; background:#101010; }
    .mentor-item small { color:#9b9b9b; }
    .agent-pill { display:inline-flex; align-items:center; gap:5px; padding:2px 8px; border-radius:999px; background:#1f1f1f; color:#cfcfcf; font-size:.72rem; border:1px solid #333; }
    .help-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-top:10px; }
    .help-opt { padding:11px 10px; border-radius:10px; border:1px solid #353535; background:#141414; color:#f5f5f5; cursor:pointer; }
    .help-opt:hover { background:#1b1b1b; border-color:#4a4a4a; }
  </style>

  <script src="app.js?v=20260419-205"></script>
  <script>
    const authLink = document.querySelector('.js-auth-link');
    const st = WETHUS.getState();
    if (authLink && (st.currentUserId || st.devMode)) {
      authLink.textContent = '로그아웃';
      authLink.href = '#';
      authLink.addEventListener('click', (e) => { e.preventDefault(); WETHUS.logout(); location.href='login.html'; });
    }

    const listEl = document.getElementById('list');
    const q = document.getElementById('q');
    const aiResultEl = document.getElementById('aiResult');
    const viewListBtn = document.getElementById('viewList');
    const viewAlbumBtn = document.getElementById('viewAlbum');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const filterBtn = document.getElementById('filterBtn');
    const filterPanel = document.getElementById('filterPanel');
    const teamSizeFilter = document.getElementById('teamSizeFilter');
    const stageFilter = document.getElementById('stageFilter');
    const sortFilter = document.getElementById('sortFilter');
    const resetFilter = document.getElementById('resetFilter');
    const categoryChips = document.getElementById('categoryChips');
    const loadMoreBtn = document.getElementById('loadMoreBtn');

    let allProjects = [];
    let currentItems = [];
    let visibleCount = 6;
    let viewMode = localStorage.getItem('wethus_explore_view') || 'album';
    let selectedCategory = null;

    const themeMap = {
      MathSci: { title: 'Math & Sci 탐색', sub: '수학/과학/연구형 프로젝트', tint: '#2fd4ff', tint2: '#2b6fff' },
      ArtCulture: { title: 'Art & Culture 탐색', sub: '영화/전시/출판/문화 프로젝트', tint: '#ff9a5f', tint2: '#ff4f5e' },
      StartupBusiness: { title: 'Startup & Business 탐색', sub: '창업/서비스/비즈니스 검증 프로젝트', tint: '#ffd247', tint2: '#ff7f1f' },
      SocietyLaw: { title: 'Society & Law 탐색', sub: '정책/사회문제/법·제도 프로젝트', tint: '#ff7eb0', tint2: '#ff4d94' }
    };
    const qs = new URLSearchParams(location.search);
    const catParam = qs.get('cat') || 'MathSci';
    const openProjectId = qs.get('open') || '';
    const currentTheme = themeMap[catParam] || themeMap.MathSci;
    document.getElementById('themeTitle').textContent = currentTheme.title;
    document.getElementById('themeSub').textContent = currentTheme.sub;
    document.documentElement.style.setProperty('--theme-tint', currentTheme.tint);
    document.documentElement.style.setProperty('--theme-tint-2', currentTheme.tint2 || currentTheme.tint);

    const AGENT_PRESETS = {
      project_assistant: { id: 'project_assistant', name: 'Project Assistant', icon: '🤖', desc: '프로젝트 구조화·우선순위 조정' },
      startup_ai: { id: 'startup_ai', name: 'Startup AI', icon: '🤖', desc: '가설 검증·실행 전략 피드백' },
      film_ai: { id: 'film_ai', name: 'Film AI', icon: '🤖', desc: '스토리·촬영·편집 피드백' },
      design_ai: { id: 'design_ai', name: 'Design AI', icon: '🤖', desc: '와이어프레임·UI 개선 제안' },
      dev_ai: { id: 'dev_ai', name: 'Dev AI', icon: '🤖', desc: '구현 흐름·기술 선택 지원' },
      research_ai: { id: 'research_ai', name: 'Research AI', icon: '🤖', desc: '리서치 구조화·근거 정리' }
    };

    const HELP_OPTIONS = [
      { key: 'planning', label: '기획 도움' },
      { key: 'design', label: '디자인 도움' },
      { key: 'development', label: '개발 도움' },
      { key: 'research', label: '리서치 도움' },
      { key: 'other', label: '기타' }
    ];

    function categoryAgentKey(project) {
      const c = String(project?.category || '').toLowerCase();
      if (c.includes('film') || c.includes('creative')) return 'film_ai';
      if (c.includes('startup') || c.includes('app') || c.includes('business')) return 'startup_ai';
      if (c.includes('policy') || c.includes('campaign')) return 'research_ai';
      return 'startup_ai';
    }

    function getProjectMentors(project) {
      const humans = Array.isArray(project?.mentors) ? project.mentors : [];
      const aiKeys = ['project_assistant', categoryAgentKey(project)];
      const aiMentors = Array.from(new Set(aiKeys)).map(k => AGENT_PRESETS[k]).filter(Boolean).map(a => ({ type:'ai', id:a.id, name:a.name, icon:a.icon, desc:a.desc }));
      return humans.map(h => ({ type:'human', id:h.id || h.name, name:h.name, icon:'👤', desc:h.expertise || '프로젝트 멘토' })).concat(aiMentors);
    }

    function mapNeedToAgent(project, needKey) {
      if (needKey === 'planning') return AGENT_PRESETS.project_assistant;
      if (needKey === 'design') return AGENT_PRESETS.design_ai;
      if (needKey === 'development') return AGENT_PRESETS.dev_ai;
      if (needKey === 'research') return AGENT_PRESETS.research_ai;
      return AGENT_PRESETS[categoryAgentKey(project)] || AGENT_PRESETS.project_assistant;
    }

    function actorId() {
      const s = WETHUS.getState();
      return s.currentUserId || (s.devMode ? 'dev-temp' : null);
    }

    function likedSymbol(p) {
      if (typeof p._liked === 'boolean') return p._liked ? '♥' : '♡';
      const actor = actorId();
      const liked = !!(actor && Array.isArray(p.likedBy) && p.likedBy.includes(actor));
      return liked ? '♥' : '♡';
    }

    function normalizeStage(v) {
      const s = String(v || '').replace(/\s+/g,'');
      if (s === '모집중' || s === '구인중') return '모집 중';
      if (s === '팀빌딩' || s === '기획중' || s === '초기팀빌딩' || s === '검토대기') return '기획 중';
      if (s === '진행중') return '진행 중';
      if (s === '피보팅') return '피보팅';
      return '기획 중';
    }

    function imageFor(project, idx) {
      if (project.image) return project.image;
      const key = (project.category || 'project').toLowerCase();
      return `https://picsum.photos/seed/wethus-${key}-${idx}/900/560`;
    }

    const memberHref = (m) => `member.html?name=${encodeURIComponent(m?.name||'팀원')}&role=${encodeURIComponent(m?.role||'담당')}&bio=${encodeURIComponent(m?.bio||'소개가 아직 없습니다.')}&founder=${m?.isLeader ? '1' : '0'}`;
    function renderTeam(team = [], project = null) {
      const hasTeam = Array.isArray(team) && team.length;
      const leader = hasTeam ? (team.find(m => m.isLeader) || team[0]) : null;
      const others = hasTeam ? team.filter(m => m !== leader) : [];
      const visible = others.slice(0,2);
      const hidden = others.slice(2);
      const aiMembers = getProjectMentors(project).filter(m => m.type === 'ai').slice(0, 2);
      return `
        <div class="team-row">
          ${leader ? `<a class="member-pill leader" href="${memberHref(leader)}"><span class="member-name">${leader?.name || '대표'}</span> <span class="member-role">대표</span></a>` : ''}
          ${visible.map(m => `<a class="member-pill" href="${memberHref(m)}"><span class="member-name">${m.name}</span> <span class="member-role">${m.role||''}</span></a>`).join('')}
          ${aiMembers.map(a => `<span class="member-pill"><span class="member-name">${a.name}</span> <span class="member-role">AI</span></span>`).join('')}
          ${hidden.length ? `<button class="team-toggle">팀원 ${hidden.length + (leader ? 1 : 0)}명</button><div class="team-list">${hidden.map(m=>`<a class="member-pill block" href="${memberHref(m)}"><span class="member-name">${m.name}</span> <span class="member-role">${m.role||''}</span></a>`).join('')}</div>` : ''}
        </div>`;
    }

    function openByProjectId(pid) {
      const p = (currentItems || []).find(x => x.id === pid) || WETHUS.listProjects().find(x => x.id === pid);
      if (!p) return;
      const idx = Math.max(0, (currentItems || []).findIndex(x => x.id === pid));
      openModal({ ...p, image: imageFor(p, idx), status: normalizeStage(p.status) });
    }

    function bindProjectCardClicks() {
      listEl.querySelectorAll('[data-project-id]').forEach(el => {
        el.onclick = (e) => {
          if (e.target.closest('.apply-btn, .bookmark-btn, .team-toggle, .member-pill')) return;

      const key = cleaned.toLowerCase();

        startup: 'Startup',

        policy: 'Policy',
        campaign: 'Campaign',

      const base = String(p.miniSummary || p.summary || p.fullDescription || '').replace(/\s+/g, ' ').trim();
      if (!base) return '요약 정보가 아직 없습니다';
      return base.replace(/[.!?。]+$/g, '').slice(0, 64);
    }

    const miniSummaryInFlight = new Set();
    async function hydrateMiniSummaries(items) {
      const actor = WETHUS.getState().currentUserId || (WETHUS.getState().devMode ? 'dev-temp' : null);
      const targets = (items || []).filter(p => {
        if (!p || !p.id) return false;
        const srcLen = String(p.fullDescription || p.summary || '').trim().length;
        if (srcLen <= 80) return false;
        const mini = String(p.miniSummary || '').trim();
        const sum = String(p.summary || '').trim();
        // 미니요약이 없거나, 기존 긴 summary를 그대로 복붙한 상태면 재생성
        return !mini || mini.length > 64 || (mini && sum && mini === sum);
      }).sort((a,b)=> {
        const ap = actor && a.founderId === actor ? 1 : 0;
        const bp = actor && b.founderId === actor ? 1 : 0;
        return bp - ap;
      }).slice(0, 12);
      for (const p of targets) {
        if (miniSummaryInFlight.has(p.id)) continue;
        miniSummaryInFlight.add(p.id);
        try {
          const src = String(p.fullDescription || p.summary || '').slice(0, 800);
          const prompt = `다음 프로젝트 설명을 한국어 한 줄(최대 60자) 명사구 스타일로 요약해줘. 문장 끝 마침표 금지, 개념/그룹/프로젝트명처럼 마무리.\n\n제목:${p.title || ''}\n본문:${src}`;
          let out = '';
          try { out = await WETHUS.askGemini(prompt); } catch (_) {}
          const fallbackBase = String(p.fullDescription || p.summary || '').replace(/\s+/g, ' ').trim();
          const fallbackLine = (fallbackBase.split(/[.!?。]\s*/)[0] || fallbackBase).slice(0, 64);
          const mini = String(out || '').replace(/\s+/g, ' ').trim().slice(0, 64)
            || fallbackLine;
          WETHUS.updateProject(p.id, { miniSummary: mini });
        } catch (_) {}
        miniSummaryInFlight.delete(p.id);
      }
    }

    function buildCategoryChips(items) {

    function projectThemeKey(project) {
      const raw = String(project.category || '').trim();
      const c = raw.toLowerCase();
      const blob = `${String(project.title || '').toLowerCase()} ${String(project.summary || '').toLowerCase()}`;

      // 1차: 카테고리 값 단일 매핑(가장 우선)
      const exact = {
        'math': 'MathSci', 'sci': 'MathSci', 'science': 'MathSci', 'research': 'MathSci', 'data': 'MathSci',
        'film': 'ArtCulture', 'creative': 'ArtCulture', 'art': 'ArtCulture', 'culture': 'ArtCulture',
        'startup': 'StartupBusiness', 'business': 'StartupBusiness', 'app': 'StartupBusiness',
        'policy': 'SocietyLaw', 'campaign': 'SocietyLaw', 'law': 'SocietyLaw', 'society': 'SocietyLaw'
      };
      if (exact[c]) return exact[c];

      // 복합 문자열 category도 첫 매칭 1개만 반환
      if (/(math|sci|science|research|data)/.test(c)) return 'MathSci';
      if (/(film|creative|art|culture)/.test(c)) return 'ArtCulture';
      if (/(startup|business|app)/.test(c)) return 'StartupBusiness';
      if (/(policy|campaign|law|society)/.test(c)) return 'SocietyLaw';

      // 2차: category 미정인 경우에만 제목/요약 키워드 사용
      if (!c) {
        if (/(연구|과학|수학|데이터|경진대회)/.test(blob)) return 'MathSci';
        if (/(영화|전시|출판|문화|크리에이티브|예술|영상)/.test(blob)) return 'ArtCulture';
        if (/(스타트업|비즈니스|서비스|브랜딩|창업|앱|mvp)/.test(blob)) return 'StartupBusiness';
        if (/(정책|사회|캠페인|법|공공|제안)/.test(blob)) return 'SocietyLaw';
      }

      return 'StartupBusiness';
    }

    function inTheme(project) {
      return projectThemeKey(project) === catParam;

    function sourceProjects() {
      const st = WETHUS.getState();
      const actor = st.currentUserId || (st.devMode ? 'dev-temp' : null);
      const me = (st.users || []).find(u => u.id === actor) || null;
      const myEmail = String(me?.email || '').toLowerCase();
      const isMine = (p) => !!(actor && (p.founderId === actor || (myEmail && String(p.founderEmail || '').toLowerCase() === myEmail)));
      const baseVisible = WETHUS.listProjects().slice().filter(p => {
        const approved = p.moderationStatus !== 'manual_review' && p.moderationStatus !== 'rejected';
        if (approved) return true;
        return isMine(p);
      });

      // 테마 필터 결과가 0개면 전체 visible로 안전 폴백
      const visible = baseVisible.filter(inTheme);
      const pool = visible.length ? visible : baseVisible;

      const mineApproved = pool.filter(p => isMine(p) && p.moderationStatus === 'approved')
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      const others = pool.filter(p => !mineApproved.includes(p));

      return mineApproved.concat(others);
    }

    function applyFilters() {
      const query = q.value.trim();
      allProjects = sourceProjects();
      let items = allProjects.slice();

      if (selectedCategory) items = items.filter(p => normalizeCategoryName(p.category) === selectedCategory);
      if (teamSizeFilter.value) items = items.filter(p => p.teamSize === teamSizeFilter.value);
      if (stageFilter.value) items = items.filter(p => p.status === stageFilter.value);
      if (query) items = WETHUS.fakeAiSearch(items, query);

      const st = WETHUS.getState();
      const actor = st.currentUserId || (st.devMode ? 'dev-temp' : null);
      const me = (st.users || []).find(u => u.id === actor) || null;
      const myEmail = String(me?.email || '').toLowerCase();
      const isMine = (p) => !!(actor && (p.founderId === actor || (myEmail && String(p.founderEmail || '').toLowerCase() === myEmail)));
      const sortMode = sortFilter?.value || 'mixed';
      if (sortMode === 'mine') {
        items = items.filter(p => isMine(p))
          .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
      } else if (sortMode === 'popular') {
        items = items.sort((a,b) => (b.likes||0) - (a.likes||0));
      } else if (sortMode === 'oldest') {
        items = items.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
      } else if (sortMode === 'mixed') {
        const newest = items.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
        const oldest = items.slice().sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
        const popular = items.slice().sort((a,b)=>(b.likes||0)-(a.likes||0));
        const mixed = [];
        const seen = new Set();
        let i = 0;
        while (mixed.length < items.length && i < items.length + 4) {
          [newest[i], popular[i], oldest[i]].forEach(p => {
            if (p && !seen.has(p.id)) { seen.add(p.id); mixed.push(p); }
          });
          i++;
        }
        items = mixed;
      } else {
        items = items.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
      }

      // 항상 내 프로젝트를 좌상단 우선 배치
      if (actor) {
        const mine = items.filter(isMine).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        const others = items.filter(p => !isMine(p));
        items = mine.concat(others);
      }

      buildCategoryChips(allProjects);
      render(items);
      return items;
    }

        modalApplyBtn.textContent = mine ? '프로젝트로 이동' : (applied ? '지원완료' : '지원하기');
      }
      if (modalBookmarkBtn) {
        const marked = WETHUS.isBookmarked(data.id);
        modalBookmarkBtn.classList.toggle('active', !!marked);
      }
      const actor = st.currentUserId || (st.devMode ? 'dev-temp' : null);
      const mine = !!actor && data.founderId === actor;
      if (modalEditBtn) modalEditBtn.style.display = mine ? 'inline-flex' : 'none';
      if (modalDeleteBtn) modalDeleteBtn.style.display = mine ? 'inline-flex' : 'none';
      if (data.moderationStatus === 'manual_review') modalStatus.textContent = '검수중';
      if (data.moderationStatus === 'rejected') modalStatus.textContent = '반려';
      renderComments(data.comments || []);
      modalCommentPanel.style.display = 'none';
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }


    listEl.addEventListener('click', async (e) => {
      const bmBtn = e.target.closest('.bookmark-btn');
      if (bmBtn) {
        e.stopPropagation();
        try {
          const res = WETHUS.toggleBookmark(bmBtn.dataset.bm);
          bmBtn.classList.toggle('active', !!res?.bookmarked);
        } catch (_) {}
        return;
      }

      const applyBtn = e.target.closest('.apply-btn');
      if (applyBtn) {
        e.stopPropagation();
        const st = WETHUS.getState();
        if (!(st.currentUserId || st.devMode)) {
          WETHUS.setAuthReturnState?.({ modalProjectId: applyBtn.dataset.apply });
          location.href = 'login.html?next=' + encodeURIComponent(location.pathname + location.search);
          return;
        }
        applyProjectId = applyBtn.dataset.apply;
        const p = (currentItems || []).find(x => x.id === applyProjectId) || WETHUS.listProjects().find(x => x.id === applyProjectId);
        const actor = st.currentUserId || (st.devMode ? 'dev-temp' : null);
        if (p && actor && p.founderId === actor) {
          location.href = `project-hub.html?projectId=${encodeURIComponent(p.id)}`;
          return;
        }
        if (applyBtn.classList.contains('applied')) {
          const ok = await WETHUS.uiConfirm('지원을 취소하겠습니까?', { title: '지원 취소' });
          if (!ok) return;
          WETHUS.cancelApplication(applyProjectId);
          visibleCount = Math.max(6, visibleCount - 1);
          applyFilters();
          return;
        }
        applyModal.classList.add('open');
        applyModal.setAttribute('aria-hidden', 'false');
        return;
      }

      const toggleBtn = e.target.closest('.team-toggle');
      if (toggleBtn) {
        const list = toggleBtn.nextElementSibling;
        if (list) list.classList.toggle('open');
        return;
      }

      const target = e.target.closest('[data-project-id]');
      if (!target) return;
      if (e.target.closest('.member-pill')) return;
      try {
        const pid = target.getAttribute('data-project-id');
        const p = (currentItems || []).find(x => x.id === pid) || WETHUS.listProjects().find(x => x.id === pid);
        if (!p) return;
        const idx = (currentItems || []).findIndex(x => x.id === pid);
        openModal({ ...p, image: imageFor(p, Math.max(0, idx)), status: normalizeStage(p.status) });
      } catch (err) {
        console.error(err);
      }
    });

    document.getElementById('modalClose').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target && e.target.getAttribute('data-close') === 'true') closeModal();
    });

    modalLikeBtn.addEventListener('click', () => {
      if (!currentProjectId) return;
      const result = WETHUS.toggleLike(currentProjectId);
      if (!result) return;
      modalLikeBtn.classList.toggle('liked', !!result.liked);
      modalLikeBtn.innerHTML = (result.liked ? '♥ ' : '♡ ') + '<span id=\"modalLikeCount\">' + result.likes + '</span>';
      const target = currentItems.find(p => p.id === currentProjectId);
      if (target) { target.likes = result.likes; target._liked = result.liked; }
      render(currentItems);
    });

    modalCommentBtn.addEventListener('click', () => {
      modalCommentPanel.style.display = 'block';
      modalCommentInput.focus();
    });

    modalBookmarkBtn?.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (!currentProjectId) return;
      try {
        const res = WETHUS.toggleBookmark(currentProjectId);
        modalBookmarkBtn.classList.toggle('active', !!res?.bookmarked);
        const btn = listEl.querySelector(`.bookmark-btn[data-bm="${currentProjectId}"]`);
        if (btn) btn.classList.toggle('active', !!res?.bookmarked);
      } catch (_) {}
    });

    modalApplyBtn.addEventListener('click', async () => {
      if (!currentProjectId) return;
      const st = WETHUS.getState();
      if (!(st.currentUserId || st.devMode)) {
        WETHUS.setAuthReturnState?.({ modalProjectId: currentProjectId });
        location.href = 'login.html?next=' + encodeURIComponent(location.pathname + location.search);
        return;
      }
      const p = (currentItems || []).find(x => x.id === currentProjectId) || WETHUS.listProjects().find(x => x.id === currentProjectId);
      const actor = st.currentUserId || (st.devMode ? 'dev-temp' : null);
      if (p && actor && p.founderId === actor) {
        location.href = `project-hub.html?projectId=${encodeURIComponent(p.id)}`;
        return;
      }
      if (WETHUS.hasApplied(currentProjectId)) {
        const ok = await WETHUS.uiConfirm('지원을 취소하겠습니까?', { title: '지원 취소' });
        if (!ok) return;
        WETHUS.cancelApplication(currentProjectId);
        closeModal();
        applyFilters();
        return;
      }
      applyProjectId = currentProjectId;
      applyModal.classList.add('open');
      applyModal.setAttribute('aria-hidden', 'false');
    });

    mentorTabHuman?.addEventListener('click', () => renderMentors(mentorProjectRef, 'human'));
    mentorTabAi?.addEventListener('click', () => renderMentors(mentorProjectRef, 'ai'));

    modalEditBtn?.addEventListener('click', async () => {
      if (!currentProjectId) return;
      const target = currentItems.find(p => p.id === currentProjectId) || WETHUS.listProjects().find(p => p.id === currentProjectId);
      if (!target) return;
      editProjectTitle.value = target.title || '';
      editProjectMini.value = String(target.miniSummary || target.summary || '').slice(0, 64);
      editProjectStatus.value = target.status || '기획 중';
      editProjectTeamSize.value = target.teamSize || '3인';
      editProjectRoles.value = target.roles || '';
      editProjectDesc.value = target.fullDescription || target.desc || '';
      editProjectModal.classList.add('open');
      editProjectModal.setAttribute('aria-hidden', 'false');
    });

    modalDeleteBtn?.addEventListener('click', async () => {
      if (!currentProjectId) return;
      const ok = await WETHUS.uiConfirm('내 프로젝트를 삭제할까요?', { title: '프로젝트 삭제' });
      if (!ok) return;
      try {
        WETHUS.deleteProject(currentProjectId);
        closeModal();
        applyFilters();
      } catch (err) {
        await WETHUS.uiAlert(err?.message || '삭제에 실패했습니다.', { title: '삭제 실패' });
      }
    });

    modalCommentClose.addEventListener('click', () => {
      modalCommentPanel.style.display = 'none';
    });

    modalCommentForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!currentProjectId) return;
      const text = (modalCommentInput.value || '').trim();
      if (!text) return;
      const comments = WETHUS.addComment(currentProjectId, text) || [];
      modalCommentInput.value = '';
      modalCommentCount.textContent = comments.length;
      renderComments(comments);
      const target = currentItems.find(p => p.id === currentProjectId);
      if (target) target.comments = comments;
      render(currentItems);
    });

    function closeEditProjectModal() {
      editProjectModal.classList.remove('open');
      editProjectModal.setAttribute('aria-hidden', 'true');
    }
    document.getElementById('editProjectClose').addEventListener('click', closeEditProjectModal);
    document.getElementById('editProjectCancel').addEventListener('click', closeEditProjectModal);
    editProjectModal.addEventListener('click', (e) => {
      if (e.target && e.target.getAttribute('data-edit-close') === 'true') closeEditProjectModal();
    });
    document.getElementById('editProjectSave').addEventListener('click', async () => {
      if (!currentProjectId) return;
      const target = currentItems.find(p => p.id === currentProjectId) || WETHUS.listProjects().find(p => p.id === currentProjectId);
      if (!target) return;
      const oneLine = String(editProjectMini.value || '').replace(/\s+/g, ' ').trim().replace(/[.!?。]+$/g, '').slice(0, 64);
      try {
        WETHUS.updateProject(currentProjectId, {
          title: editProjectTitle.value.trim() || target.title,
          summary: oneLine || target.summary,
          miniSummary: oneLine || target.miniSummary || target.summary,
          status: editProjectStatus.value || target.status,
          teamSize: editProjectTeamSize.value || target.teamSize,
          roles: editProjectRoles.value.trim() || target.roles,
          fullDescription: editProjectDesc.value.trim() || target.fullDescription || target.desc,
          desc: editProjectDesc.value.trim() || target.desc,
          updatedAt: new Date().toISOString()
        });
        closeEditProjectModal();
        closeModal();
        applyFilters();
      } catch (err) {
        await WETHUS.uiAlert(err?.message || '수정에 실패했습니다.', { title: '수정 실패' });
      }
    });

    document.getElementById('applyClose').addEventListener('click', () => {
      applyModal.classList.remove('open');
      applyModal.setAttribute('aria-hidden', 'true');
    });
    applyModal.addEventListener('click', (e) => {
      if (e.target && e.target.getAttribute('data-close-apply') === 'true') {
        applyModal.classList.remove('open');
        applyModal.setAttribute('aria-hidden', 'true');
      }
    });
    document.getElementById('applySubmit').addEventListener('click', async () => {
      if (!applyProjectId) return;
      const st = WETHUS.getState();
      if (!(st.currentUserId || st.devMode)) {
        WETHUS.setAuthReturnState?.({ modalProjectId: applyProjectId });
        location.href = 'login.html?next=' + encodeURIComponent(location.pathname + location.search);
        return;
      }
      const motivation = (applyMotivation.value || '').trim();
      if (!motivation) { await WETHUS.uiAlert('지원동기를 입력해주세요.', { title: '입력 필요' }); return; }
      const ok = await WETHUS.uiConfirm('지원하시겠습니까?', { title: '프로젝트 지원' });
      if (!ok) return;
      WETHUS.applyToProject(applyProjectId, motivation);
      applyMotivation.value='';
      applyModal.classList.remove('open');
      applyModal.setAttribute('aria-hidden', 'true');
      if (currentProjectId === applyProjectId) closeModal();
      applyFilters();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeModal(); }
    });

    buildCategoryChips(allProjects);
    applyFilters();
    const returnRaw = sessionStorage.getItem('wethus_auth_return_state');
    if (returnRaw) {
      try {
        const rs = JSON.parse(returnRaw);
        if (rs?.path === location.pathname) {
          if (typeof rs.scrollY === 'number') setTimeout(() => window.scrollTo(0, rs.scrollY), 0);
          if (rs.modalProjectId) {
            const p = (currentItems || []).find(x => x.id === rs.modalProjectId);
            if (p) openModal(p);
          }
          sessionStorage.removeItem('wethus_auth_return_state');
        }
      } catch (_) {}
    }
    if (openProjectId) {
      const p = (currentItems || []).find(x => x.id === openProjectId) || WETHUS.listProjects().find(x => x.id === openProjectId);
      if (p) openModal(p);
    }
  </script>
</body>
</html>
