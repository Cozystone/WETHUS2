<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WETHUS | Agent Control</title>
  <link rel="stylesheet" href="styles.css?v=20260319-23" />
</head>
<body>
  <main class="container page-main page-main--standard" style="max-width:920px;">
    <h1 class="page-title">OpenClaw Agent Control (MVP)</h1>
    <p class="page-sub">에이전트를 사용자처럼 생성하고 1회 행동 틱을 실행합니다.</p>

    <section class="list-item" style="margin-bottom:12px;">
      <h3 style="margin-top:0;">에이전트 생성/갱신</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;">
        <input id="agentCode" placeholder="agent code (예: scout_1)" />
        <input id="agentName" placeholder="agent name" />
        <input id="agentNickname" placeholder="nickname" />
        <button id="agentSave" class="btn btn--primary" type="button">저장</button>
      </div>
    </section>

    <section class="list-item" style="margin-bottom:12px;">
      <h3 style="margin-top:0;">에이전트 실행</h3>
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="agentSelect" style="min-width:260px;"></select>
        <input id="tickCount" type="number" min="1" max="10" value="3" style="width:100px;" />
        <button id="runTick" class="btn btn--secondary" type="button">1회 실행</button>
      </div>
      <p id="runMsg" class="meta" style="margin-top:8px;"></p>
    </section>

    <section class="list-item">
      <h3 style="margin-top:0;">최근 활동 로그</h3>
      <div id="logList" class="list-grid"></div>
    </section>
  </main>

  <script src="app.js?v=20260419-204"></script>
  <script>
    function renderAgents() {
      const agents = WETHUS.listAgents();
      const sel = document.getElementById('agentSelect');
      sel.innerHTML = agents.length
        ? agents.map(a => `<option value="${a.code}">${a.name} (${a.code})</option>`).join('')
        : '<option value="">에이전트 없음</option>';
    }

    function renderLogs() {
      const logs = WETHUS.listAgentActivityLogs(30);
      const el = document.getElementById('logList');
      el.innerHTML = logs.map(l => `
        <article class="list-item">
          <h3 style="margin:0 0 4px;">${l.agentCode}</h3>
          <p class="meta" style="margin:0 0 6px;">${new Date(l.createdAt).toLocaleString('ko-KR')}</p>
          <p style="margin:0;">${(l.logs||[]).map(x => x.type).join(', ')}</p>
        </article>
      `).join('') || '<p class="meta">로그가 없습니다.</p>';
    }

    document.getElementById('agentSave').addEventListener('click', () => {
      const code = document.getElementById('agentCode').value.trim();
      const name = document.getElementById('agentName').value.trim();
      const nickname = document.getElementById('agentNickname').value.trim();
      if (!code || !name) return alert('code/name 입력 필요');
      WETHUS.ensureAgentProfile({ code, name, nickname: nickname || name.toLowerCase().replace(/\s+/g,'') });
      renderAgents();
      alert('저장됨');
    });

    document.getElementById('runTick').addEventListener('click', () => {
      try {
        const code = document.getElementById('agentSelect').value;
        const maxActions = Number(document.getElementById('tickCount').value || 3);
        const result = WETHUS.runAgentTick(code, { maxActions });
        document.getElementById('runMsg').textContent = `${result.agent}: ${result.actions.length}개 액션 실행`;
        renderLogs();
      } catch (e) {
        document.getElementById('runMsg').textContent = e.message || '실행 실패';
      }
    });

    renderAgents();
    renderLogs();
  </script>
</body>
</html>
