<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PKF58GJC08"></script>
  <script>
   window.dataLayer = window.dataLayer || [];
   function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-PKF58GJC08');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WETHUS | 멘토</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css?v=20260319-23" />
  <style>
    .mentor-tabs{display:flex;gap:8px;margin:8px 0 14px}
    .mentor-tab{padding:8px 14px;border-radius:999px;border:1px solid #333;background:#151515;color:#d8d8d8;cursor:pointer}
    .mentor-tab.active{background:#f5f5f5;color:#111;border-color:#f5f5f5;font-weight:700}
    .mentor-toolbar{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:12px}
    .mentor-search{background:#101010;border:1px solid #2b2b2b;border-radius:10px;color:#f5f5f5;padding:10px 12px}
    .mentor-cats{display:flex;gap:6px;flex-wrap:wrap}
    .mentor-chip{padding:6px 10px;border-radius:999px;border:1px solid #313131;background:#141414;color:#d3d3d3;font-size:.78rem;cursor:pointer}
    .mentor-chip.active{background:#f5f5f5;color:#111;border-color:#f5f5f5}
    .mentor-pane{display:none}
    .mentor-pane.active{display:block}
    .mentor-list{display:grid;gap:10px}
    .mentor-item{border:1px solid #2b2b2b;border-radius:12px;padding:12px;background:#121212;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}
    .mentor-avatar{width:46px;height:46px;border-radius:999px;display:grid;place-items:center;background:#1f1f1f;border:1px solid #3a3a3a;color:#f5f5f5;font-weight:800;overflow:hidden}
    .mentor-avatar img{width:100%;height:100%;object-fit:cover;display:block}
    .mentor-name{margin:0;font-size:.98rem}
    .mentor-sub{margin:2px 0 0;color:#a9a9a9;font-size:.82rem}
    .mentor-role{margin:6px 0 0;font-size:.84rem;color:#ddd}
    .mentor-load{margin:6px 0 0;font-size:.8rem;color:#cfcfcf}
    .mentor-actions{display:flex;gap:8px;align-items:center}
    @media (max-width:760px){
      .mentor-toolbar{grid-template-columns:1fr}
      .mentor-item{grid-template-columns:auto 1fr;}
      .mentor-actions{grid-column:1 / -1;justify-content:flex-end}
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="index.html" class="wordmark">WETHUS</a>
      <nav class="nav-links">
        <a href="explore.html" class="nav-link">탐색</a>
        <a href="founder.html" class="nav-link">프로젝트 시작하기</a>
        <a href="mentor.html" class="nav-link nav-link--cta">멘토</a>
        <a href="profile.html" class="nav-link">프로필</a>
        <a href="login.html" class="nav-link js-auth-link">로그인</a>
      </nav>
    </div>
  </header>

  <main class="container page-main page-main--standard">
    <section class="page-header">
      <h1 class="page-title">멘토</h1>
      <p class="page-sub">사람 멘토와 AI 멘토를 같은 화면에서 관리합니다.</p>
    </section>

    <div class="mentor-tabs">
      <button id="tabHuman" class="mentor-tab active" type="button">Human Mentors</button>
      <button id="tabAi" class="mentor-tab" type="button">AI Mentors</button>
    </div>

    <div class="mentor-toolbar">
      <input id="mentorSearch" class="mentor-search" placeholder="이름, 역할, 멘토 분야 검색" />
      <div id="mentorCats" class="mentor-cats"></div>
    </div>

    <section id="paneHuman" class="mentor-pane active">
      <div id="humanList" class="mentor-list"></div>
    </section>

    <section id="paneAi" class="mentor-pane">
      <div id="aiList" class="mentor-list"></div>
    </section>

    <p id="mentorMsg" class="form-message"></p>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <span class="wordmark">WETHUS</span>
        <p class="footer-copy">Built for real youth project execution · Developer <a href="mailto:anseokkim@gmail.com">anseokkim@gmail.com</a><br/>Copyright © WETHUS. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="app.js?v=20260318-58"></script>
  <script>
    WETHUS.requireAuth();
    const authLink = document.querySelector('.js-auth-link');
    const st = WETHUS.getState();
    if (authLink && (st.currentUserId || st.devMode)) {
      authLink.textContent = '로그아웃';
      authLink.href = '#';
      authLink.addEventListener('click', (e) => { e.preventDefault(); WETHUS.logout(); location.href='login.html'; });
    }

    const me = WETHUS.currentUser();
    const plan = String(me?.plan || 'free').toLowerCase();
    const canHumanDm = ['pro','master'].includes(plan);

    const humanMentors = [
      { id:'hm_1', name:'김민준', title:'제품/서비스 MVP 멘토', role:'앱/웹 MVP 구조, 기능 우선순위, 초기 검증 설계', category:'기획', activeTeams:5, capacity:10, avatar:'https://i.pravatar.cc/100?img=12' },
      { id:'hm_2', name:'박서윤', title:'영상 제작 멘토', role:'기획-촬영-편집 워크플로우와 팀 운영 피드백', category:'영상', activeTeams:10, capacity:10, avatar:'https://i.pravatar.cc/100?img=47' },
      { id:'hm_3', name:'이도윤', title:'브랜딩/디자인 멘토', role:'브랜드 메시지, 디자인 방향성, 랜딩 개선', category:'디자인', activeTeams:3, capacity:8, avatar:'https://i.pravatar.cc/100?img=33' }
    ];

    const aiMentors = [
      { id:'project_assistant', name:'Project Assistant', title:'프로젝트 실행 멘토', role:'실행 계획, 우선순위, 스프린트 정리', category:'기획', avatar:'https://api.dicebear.com/9.x/bottts/svg?seed=ProjectAssistant' },
      { id:'startup_ai', name:'Startup AI', title:'스타트업 멘토', role:'가설 검증, MVP 범위, 고객 인터뷰 가이드', category:'스타트업', avatar:'https://api.dicebear.com/9.x/bottts/svg?seed=StartupAI' },
      { id:'film_ai', name:'Film AI', title:'영상 제작 멘토', role:'스토리, 촬영 계획, 편집 피드백', category:'영상', avatar:'https://api.dicebear.com/9.x/bottts/svg?seed=FilmAI' },
      { id:'design_ai', name:'Design AI', title:'디자인 멘토', role:'와이어프레임, UX 개선, 시안 피드백', category:'디자인', avatar:'https://api.dicebear.com/9.x/bottts/svg?seed=DesignAI' }
    ];

    const tabHuman = document.getElementById('tabHuman');
    const tabAi = document.getElementById('tabAi');
    const paneHuman = document.getElementById('paneHuman');
    const paneAi = document.getElementById('paneAi');
    const humanList = document.getElementById('humanList');
    const aiList = document.getElementById('aiList');
    const mentorSearch = document.getElementById('mentorSearch');
    const mentorCats = document.getElementById('mentorCats');
    const mentorMsg = document.getElementById('mentorMsg');

    let activeTab = 'human';
    let activeCategory = '전체';

    function setTab(tab){
      activeTab = tab;
      tabHuman.classList.toggle('active', tab === 'human');
      tabAi.classList.toggle('active', tab === 'ai');
      paneHuman.classList.toggle('active', tab === 'human');
      paneAi.classList.toggle('active', tab === 'ai');
      activeCategory = '전체';
      renderCategories();
      renderMentors();
    }

    function currentList(){ return activeTab === 'human' ? humanMentors : aiMentors; }

    function renderCategories(){
      const cats = ['전체', ...Array.from(new Set(currentList().map(x => x.category)))];
      mentorCats.innerHTML = cats.map(c => `<button class="mentor-chip ${c===activeCategory?'active':''}" data-cat="${c}" type="button">${c}</button>`).join('');
      mentorCats.querySelectorAll('.mentor-chip').forEach(btn => {
        btn.addEventListener('click', () => { activeCategory = btn.getAttribute('data-cat') || '전체'; renderCategories(); renderMentors(); });
      });
    }

    function matchesFilter(item){
      const q = mentorSearch.value.trim().toLowerCase();
      const hitQ = !q || `${item.name} ${item.title} ${item.role} ${item.category}`.toLowerCase().includes(q);
      const hitCat = activeCategory === '전체' || item.category === activeCategory;
      return hitQ && hitCat;
    }

    async function startDm(targetName, targetUserId, targetAvatar){
      try {
        const thread = await WETHUS.createDmThread({ targetName, targetUserId, targetAvatar });
        location.href = `dm.html?threadId=${encodeURIComponent(thread?.id || '')}`;
      } catch (e) {
        mentorMsg.textContent = e?.message || 'DM 연결에 실패했습니다.';
      }
    }

    function renderMentors(){
      const filtered = currentList().filter(matchesFilter);
      const targetEl = activeTab === 'human' ? humanList : aiList;
      if (!filtered.length) {
        targetEl.innerHTML = '<article class="mentor-item"><div class="mentor-avatar">!</div><div><h3 class="mentor-name">조건에 맞는 멘토가 없습니다.</h3></div></article>';
        return;
      }

      targetEl.innerHTML = filtered.map(m => {
        const avatarTxt = (m.name || 'M').trim().charAt(0).toUpperCase();
        const avatarHtml = m.avatar ? `<img src="${m.avatar}" alt="${m.name || 'mentor'}" />` : avatarTxt;
        if (activeTab === 'human') {
          const isFull = Number(m.activeTeams || 0) >= Number(m.capacity || 0);
          return `
            <article class="mentor-item">
              <div class="mentor-avatar">${avatarHtml}</div>
              <div>
                <h3 class="mentor-name">${m.name} 멘토</h3>
                <p class="mentor-sub">${m.title}</p>
                <p class="mentor-role">${m.role}</p>
                <p class="mentor-load">자문중 팀 ${m.activeTeams}/${m.capacity} ${isFull ? '· 정원마감(대기가능)' : ''}</p>
              </div>
              <div class="mentor-actions">
                ${isFull
                  ? `<button class="btn btn--secondary" data-wait-human="${m.id}" type="button">대기 신청하기</button>`
                  : `<button class="btn btn--secondary" data-consult-human="${m.id}" type="button">자문 요청하기</button>`}
                ${canHumanDm ? `<button class="btn btn--primary" data-dm-human="${m.id}" type="button">DM 보내기</button>` : ''}
              </div>
            </article>`;
        }
        return `
          <article class="mentor-item">
            <div class="mentor-avatar">${avatarHtml || '🤖'}</div>
            <div>
              <h3 class="mentor-name">${m.name}</h3>
              <p class="mentor-sub">${m.title}</p>
              <p class="mentor-role">${m.role}</p>
            </div>
            <div class="mentor-actions">
              <button class="btn btn--primary" data-consult-ai="${m.id}" type="button">자문 요청하기</button>
            </div>
          </article>`;
      }).join('');

      targetEl.querySelectorAll('[data-consult-human]').forEach(btn => {
        btn.addEventListener('click', () => {
          const m = humanMentors.find(x => x.id === btn.getAttribute('data-consult-human'));
          if (m) startDm(`${m.name} 멘토`, `human-mentor:${m.id}`, m.avatar || '');
        });
      });
      targetEl.querySelectorAll('[data-wait-human]').forEach(btn => {
        btn.addEventListener('click', () => {
          const m = humanMentors.find(x => x.id === btn.getAttribute('data-wait-human'));
          mentorMsg.textContent = m ? `${m.name} 멘토는 현재 정원 마감입니다. 대기 신청이 접수되었습니다.` : '대기 신청이 접수되었습니다.';
        });
      });
      targetEl.querySelectorAll('[data-dm-human]').forEach(btn => {
        btn.addEventListener('click', () => {
          const m = humanMentors.find(x => x.id === btn.getAttribute('data-dm-human'));
          if (m) startDm(`${m.name} 멘토`, `human-mentor:${m.id}`, m.avatar || '');
        });
      });
      targetEl.querySelectorAll('[data-consult-ai]').forEach(btn => {
        btn.addEventListener('click', () => {
          const m = aiMentors.find(x => x.id === btn.getAttribute('data-consult-ai'));
          if (m) startDm(m.name, `agent:${m.id}`, m.avatar || '');
        });
      });
    }

    tabHuman.addEventListener('click', ()=>setTab('human'));
    tabAi.addEventListener('click', ()=>setTab('ai'));
    mentorSearch.addEventListener('input', renderMentors);

    renderCategories();
    renderMentors();
  </script>
</body>
</html>
