<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WETHUS | 대회/공모전</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css?v=20260319-23" />
  <style>
    .opp-shell{margin-top:24px}
    .opp-head{display:flex;justify-content:space-between;gap:12px;align-items:end;flex-wrap:wrap;margin-bottom:14px}
    .opp-filters{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px}
    .opp-filter{padding:8px 12px;border-radius:999px;border:1px solid #333;background:#141414;color:#ddd;cursor:pointer}
    .opp-filter.active{background:#ff8a00;color:#111;border-color:#ff8a00;font-weight:700}
    .opp-grid{display:grid;gap:10px;grid-template-columns:repeat(2,minmax(0,1fr))}
    .opp-card{border:1px solid #2a2a2a;border-radius:12px;background:#121212;padding:12px;cursor:pointer}
    .opp-card:hover{border-color:#3c3c3c;background:#151515}
    .opp-meta{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0}
    .opp-detail{border:1px solid #2a2a2a;border-radius:14px;background:#111;padding:14px}
    .opp-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:14px}
    .opp-kv{display:grid;grid-template-columns:120px 1fr;gap:8px 12px;margin-top:12px}
    .opp-kv .k{color:#9c9c9c}
    .opp-related{margin-top:14px;border-top:1px solid #272727;padding-top:12px}
    .hidden{display:none !important}
    @media (max-width:860px){.opp-grid{grid-template-columns:1fr}.opp-actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="index.html" class="wordmark">WETHUS</a>
      <nav class="nav-links">
        <a href="explore.html" class="nav-link">탐색</a>
        <a href="founder.html" class="nav-link">프로젝트 시작하기</a>
        <a href="project-hub.html" class="nav-link">프로젝트 허브</a>
        <a href="opportunities.html" class="nav-link nav-link--cta">대회/공모전</a>
        <a href="mentor.html" class="nav-link">멘토</a>
        <a href="profile.html" class="nav-link">프로필</a>
        <a href="login.html" class="nav-link js-auth-link">로그인</a>
      </nav>
    </div>
  </header>

  <main class="container page-main page-main--standard opp-shell">
    <section id="oppListView">
      <div class="opp-head">
        <div>
          <h1 class="page-title" style="margin:0;">대회/공모전</h1>
          <p class="page-sub" style="margin-top:6px;">선별된 대회/공모전을 바로 실행으로 전환하세요. 정보 열람보다 프로젝트 시작을 우선합니다.</p>
        </div>
      </div>
      <div id="oppFilters" class="opp-filters"></div>
      <div id="oppGrid" class="opp-grid"></div>
    </section>

    <section id="oppDetailView" class="hidden">
      <button id="oppBackBtn" class="btn btn--secondary" type="button" style="margin-bottom:10px;">← 대회/공모전 목록으로</button>
      <article class="opp-detail">
        <h2 id="oppTitle" style="margin:0 0 8px;"></h2>
        <p id="oppSummary" class="page-sub" style="margin:0 0 8px;"></p>
        <div class="opp-meta">
          <span id="oppType" class="badge"></span>
          <span id="oppAudience" class="badge"></span>
          <span id="oppTeamRule" class="badge"></span>
        </div>
        <div class="opp-kv">
          <div class="k">주최</div><div id="oppOrg"></div>
          <div class="k">마감</div><div id="oppDeadline"></div>
          <div class="k">왜 중요한가</div><div id="oppWhy"></div>
          <div class="k">링크</div><div id="oppLink"></div>
        </div>

        <div class="opp-actions">
          <button id="oppStartBtn" class="btn btn--primary" type="button">이 대회/공모전으로 프로젝트 시작하기</button>
          <button id="oppTeamsBtn" class="btn btn--secondary" type="button">관련 팀 보기</button>
          <button id="oppInterestBtn" class="btn btn--secondary" type="button">관심 등록</button>
        </div>

        <div class="opp-related">
          <h3 style="margin:0 0 8px;">관련 WETHUS 팀</h3>
          <div id="oppRelatedList" class="list-grid"></div>
        </div>
      </article>
    </section>
  </main>

  <script src="app.js?v=20260409-103"></script>
  <script>
    WETHUS.requireAuth();
    const authLink = document.querySelector('.js-auth-link');
    const st = WETHUS.getState();
    if (authLink && (st.currentUserId || st.devMode)) {
      authLink.textContent='로그아웃'; authLink.href='#'; authLink.addEventListener('click', (e)=>{e.preventDefault();WETHUS.logout();location.href='login.html';});
    }

    const OPP_KEY = 'wethus_opportunities_v1';
    const INTEREST_KEY = 'wethus_opportunity_interest_v1';

    const seed = [
      { id:'opp-kdb-2026', title:'KDB 스타트업 경진대회 트랙', organizer:'KDB 창업지원센터', summary:'초기 학생팀도 참가 가능한 검증형 경진대회. MVP 데모 중심 심사.', type:'창업대회', audience:'대학생/청년', deadline:'2026-05-10', teamRule:'either', why:'실제 투자자/심사단 피드백과 초기 네트워크를 얻기 좋습니다.', link:'https://example.com/kdb' },
      { id:'opp-campus-hack-spring', title:'Campus Build 해커톤 Spring', organizer:'Campus Build', summary:'48시간 제품 빌드 해커톤. 팀 빌딩 세션 포함.', type:'해커톤', audience:'대학생/예비창업팀', deadline:'2026-04-30', teamRule:'team', why:'빠르게 팀을 만들고 첫 프로토타입을 출시하기 가장 좋은 포맷입니다.', link:'https://example.com/hack' },
      { id:'opp-seoul-student-support', title:'서울 학생창업 지원사업(시드형)', organizer:'서울시 청년창업본부', summary:'학생 창업팀 대상 소규모 실행비/멘토링 지원.', type:'지원사업', audience:'학생창업팀', deadline:'2026-05-25', teamRule:'team', why:'아이디어 단계를 넘어 실제 실행비를 확보할 수 있습니다.', link:'https://example.com/seoul' },
      { id:'opp-social-innovation', title:'청년 사회혁신 아이디어 공모전', organizer:'임팩트 재단', summary:'사회문제 해결형 아이디어·프로토타입 공모.', type:'공모전', audience:'청년/학생', deadline:'2026-05-18', teamRule:'either', why:'문제정의 강한 팀에게 레퍼런스와 후속 프로그램 연결 기회가 큽니다.', link:'https://example.com/social' },
      { id:'opp-student-founder-week', title:'Student Founder Week 프로그램', organizer:'Founder Week Korea', summary:'학생창업 팀빌딩·검증 워크숍 + 데모데이.', type:'프로그램 / 행사', audience:'예비 창업자', deadline:'2026-06-02', teamRule:'individual', why:'혼자 시작한 학생이 팀을 만들고 바로 실행계획으로 넘어가기 좋습니다.', link:'https://example.com/founder-week' }
    ];

    function loadOpps(){
      try {
        const saved = JSON.parse(localStorage.getItem(OPP_KEY) || '[]');
        if (Array.isArray(saved) && saved.length) return saved;
      } catch(_) {}
      localStorage.setItem(OPP_KEY, JSON.stringify(seed));
      return seed.slice();
    }

    function actorId(){
      const st = WETHUS.getState();
      return st.currentUserId || (st.devMode ? 'dev-temp' : 'guest');
    }

    function loadInterest(){
      try { return JSON.parse(localStorage.getItem(INTEREST_KEY) || '{}'); } catch { return {}; }
    }

    function hasInterest(oppId){
      const all = loadInterest();
      const mine = all[actorId()] || [];
      return mine.includes(oppId);
    }

    function toggleInterest(oppId){
      const all = loadInterest();
      const key = actorId();
      const mine = new Set(all[key] || []);
      if (mine.has(oppId)) mine.delete(oppId); else mine.add(oppId);
      all[key] = Array.from(mine);
      localStorage.setItem(INTEREST_KEY, JSON.stringify(all));
      return mine.has(oppId);
    }

    function relatedProjects(oppId){
      return WETHUS.listProjects().filter(p => String(p.opportunityId || '') === String(oppId));
    }

    const filters = ['전체','공모전','창업대회','지원사업','해커톤','프로그램 / 행사'];
    let activeFilter = '전체';
    let currentOpp = null;
    const opps = loadOpps();

    function renderFilters(){
      const el = document.getElementById('oppFilters');
      el.innerHTML = filters.map(f => `<button class="opp-filter ${f===activeFilter?'active':''}" data-filter="${f}" type="button">${f}</button>`).join('');
      el.querySelectorAll('[data-filter]').forEach(btn=>btn.addEventListener('click',()=>{activeFilter=btn.dataset.filter;renderFilters();renderList();}));
    }

    function renderList(){
      const grid = document.getElementById('oppGrid');
      const rows = opps.filter(o => activeFilter==='전체' ? true : o.type===activeFilter);
      if (!rows.length) { grid.innerHTML='<article class="opp-card"><p class="meta">조건에 맞는 대회/공모전이 없습니다.</p></article>'; return; }
      grid.innerHTML = rows.map(o => {
        const count = relatedProjects(o.id).length;
        return `<article class="opp-card" data-opp="${o.id}">
          <h3 style="margin:0 0 6px;">${o.title}</h3>
          <p class="meta" style="margin:0 0 6px;">${o.organizer} · 마감 ${o.deadline}</p>
          <p style="margin:0 0 8px;color:#d8d8d8;">${o.summary}</p>
          <div class="opp-meta">
            <span class="badge">${o.type}</span>
            <span class="badge">${o.audience}</span>
            <span class="badge">팀: ${o.teamRule==='team'?'팀 필수':(o.teamRule==='individual'?'개인 중심':'개인/팀 가능')}</span>
            <span class="badge">관련 프로젝트 ${count}</span>
          </div>
        </article>`;
      }).join('');
      grid.querySelectorAll('[data-opp]').forEach(el => el.addEventListener('click',()=>openDetail(el.dataset.opp)));
    }

    function openDetail(id){
      currentOpp = opps.find(o=>o.id===id);
      if (!currentOpp) return;
      document.getElementById('oppListView').classList.add('hidden');
      document.getElementById('oppDetailView').classList.remove('hidden');
      document.getElementById('oppTitle').textContent = currentOpp.title;
      document.getElementById('oppSummary').textContent = currentOpp.summary;
      document.getElementById('oppType').textContent = currentOpp.type;
      document.getElementById('oppAudience').textContent = currentOpp.audience;
      document.getElementById('oppTeamRule').textContent = currentOpp.teamRule==='team'?'팀 필수':(currentOpp.teamRule==='individual'?'개인 중심':'개인/팀 가능');
      document.getElementById('oppOrg').textContent = currentOpp.organizer;
      document.getElementById('oppDeadline').textContent = currentOpp.deadline;
      document.getElementById('oppWhy').textContent = currentOpp.why;
      document.getElementById('oppLink').innerHTML = `<a href="${currentOpp.link}" target="_blank" rel="noopener noreferrer">원문 보기</a>`;
      updateInterestBtn();
      renderRelated();
    }

    function renderRelated(){
      const el = document.getElementById('oppRelatedList');
      const rows = relatedProjects(currentOpp.id);
      if (!rows.length) {
        el.innerHTML = '<article class="list-item"><h3>아직 연결된 팀이 없습니다.</h3><p class="meta">이 대회/공모전으로 첫 프로젝트를 시작해보세요.</p></article>';
        return;
      }
      el.innerHTML = rows.map(p => `<article class="list-item"><h3>${p.title}</h3><p class="meta">${p.summary || ''}</p></article>`).join('');
    }

    function updateInterestBtn(){
      const on = hasInterest(currentOpp.id);
      document.getElementById('oppInterestBtn').textContent = on ? '관심 등록됨' : '관심 등록';
      document.getElementById('oppInterestBtn').className = on ? 'btn btn--primary' : 'btn btn--secondary';
    }

    document.getElementById('oppBackBtn').addEventListener('click',()=>{
      currentOpp = null;
      document.getElementById('oppDetailView').classList.add('hidden');
      document.getElementById('oppListView').classList.remove('hidden');
      renderList();
    });

    document.getElementById('oppStartBtn').addEventListener('click',()=>{
      if (!currentOpp) return;
      const q = new URLSearchParams({
        opportunityId: currentOpp.id,
        oppTitle: currentOpp.title,
        oppOrg: currentOpp.organizer,
        oppDeadline: currentOpp.deadline,
        oppType: currentOpp.type,
        oppSummary: currentOpp.summary
      });
      location.href = `founder.html?${q.toString()}`;
    });

    document.getElementById('oppTeamsBtn').addEventListener('click',()=>{
      const target = document.getElementById('oppRelatedList');
      target.scrollIntoView({ behavior:'smooth', block:'start' });
    });

    document.getElementById('oppInterestBtn').addEventListener('click',()=>{
      if (!currentOpp) return;
      toggleInterest(currentOpp.id);
      updateInterestBtn();
    });

    renderFilters();
    renderList();
  </script>
</body>
</html>
