<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WETHUS | 로그인</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css?v=20260319-13" />
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-card">
      <a href="index.html" class="auth-close" aria-label="닫기">×</a>
      <h1>WETHUS 계정</h1>
      <p>로그인하거나, 회원가입 후 바로 프로젝트를 시작할 수 있습니다.</p>

      <div class="auth-tabs">
        <button id="tabLogin" class="btn btn--secondary auth-tab active" type="button">로그인</button>
        <button id="tabSignup" class="btn btn--secondary auth-tab" type="button">회원가입</button>
      </div>

      <form class="auth-form" id="loginForm" novalidate>
        <input id="loginEmail" name="email" type="email" placeholder="이메일" required />
        <input name="password" type="password" placeholder="비밀번호" required />
        <label style="display:flex;gap:8px;align-items:center;color:#a3a3a3;font-size:.85rem;">
          <input id="rememberEmail" type="checkbox" /> 아이디(이메일) 저장
        </label>
        <button class="btn btn--primary" type="submit">로그인</button>
      </form>

      <form class="auth-form" id="signupForm" style="display:none;" novalidate>
        <input name="name" placeholder="이름" required />
        <input name="nickname" placeholder="닉네임" required />
        <input id="signupEmail" name="email" type="email" placeholder="이메일" required />
        <small id="emailHint" class="note"></small>

        <input id="signupPw" name="password" type="password" placeholder="비밀번호 (영문+숫자 포함 8자 이상)" required />
        <small id="pwHint" class="note"></small>

        <input id="signupPwConfirm" name="passwordConfirm" type="password" placeholder="비밀번호 확인" required />
        <small id="pwConfirmHint" class="note"></small>

        <label style="display:flex;gap:8px;align-items:flex-start;color:#a3a3a3;font-size:.85rem;line-height:1.5;">
          <input id="agreeChk" type="checkbox" style="margin-top:2px;" />
          <span>만 22세 미만 학생임을 확인하며, WETHUS 이용약관/커뮤니티 가이드/개인정보 수집 및 AI 기반 신청서 검토에 동의합니다.</span>
        </label>

        <button id="signupSubmit" class="btn btn--primary" type="submit" disabled>회원가입</button>
      </form>

      <div class="auth-sep" style="display:flex;align-items:center;gap:10px;margin:14px 0 10px;color:#8f8f8f;font-size:.82rem;">
        <span style="flex:1;height:1px;background:#2a2a2a;"></span>
        <span>또는 소셜 로그인</span>
        <span style="flex:1;height:1px;background:#2a2a2a;"></span>
      </div>

      <div id="googleAuthWrap" style="display:grid;gap:8px;margin-bottom:12px;">
        <div id="g_id_onload" style="display:none;"></div>
        <div id="googleBtn" style="display:flex;justify-content:center;"></div>
        <p id="googleHint" class="note" style="margin:0;text-align:center;"></p>
      </div>

      <div class="dev-row">
        <button id="devModeBtn" class="btn btn--secondary" type="button">개발자모드</button>
      </div>
      <p id="authMsg" class="form-message"></p>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <span class="wordmark">WETHUS</span>
        <p class="footer-copy">Built for real youth project execution · Developer <a href="mailto:anseokkim@gmail.com">anseokkim@gmail.com</a><br/>Copyright © WETHUS. All rights reserved.</p>
      </div>
    </div>
  </footer>


  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="app.js?v=20260318-39"></script>
  <script>
    const msg = document.getElementById('authMsg');
    const tabLogin = document.getElementById('tabLogin');
    const googleHint = document.getElementById('googleHint');

    const GOOGLE_CLIENT_ID = window.WETHUS_GOOGLE_CLIENT_ID || '196934770979-6ntmgcrs6k6jkifskspasg4uie5irgec.apps.googleusercontent.com';
    const isLocalHost = ['localhost', '127.0.0.1'].includes(location.hostname);
    const localBases = ['http://127.0.0.1:8787', 'http://localhost:8787'];
    const remoteBase = window.WETHUS_API_BASE || 'https://wethus-api.onrender.com';
    const AUTH_BASES = isLocalHost
      ? [remoteBase, `${location.protocol}//${location.hostname}:8787`, ...localBases].filter(Boolean)
      : [remoteBase].filter(Boolean);
    const GOOGLE_AUTH_ENDPOINTS = AUTH_BASES.map(b => `${b.replace(/\/$/, '')}/auth/google`);
    const LOGIN_ENDPOINTS = AUTH_BASES.map(b => `${b.replace(/\/$/, '')}/auth/login`);
    const REGISTER_ENDPOINTS = AUTH_BASES.map(b => `${b.replace(/\/$/, '')}/auth/register`);
    const tabSignup = document.getElementById('tabSignup');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    const loginEmail = document.getElementById('loginEmail');
    const rememberEmail = document.getElementById('rememberEmail');
    const signupEmail = document.getElementById('signupEmail');
    const signupPw = document.getElementById('signupPw');
    const signupPwConfirm = document.getElementById('signupPwConfirm');
    const emailHint = document.getElementById('emailHint');
    const pwHint = document.getElementById('pwHint');
    const pwConfirmHint = document.getElementById('pwConfirmHint');
    const agreeChk = document.getElementById('agreeChk');
    const signupSubmit = document.getElementById('signupSubmit');

    if (!window.WETHUS) {
      msg.textContent = '앱 로딩 오류가 발생했습니다. 새로고침 후 다시 시도해주세요.';
    }
    if (!isLocalHost && !window.WETHUS_API_BASE) {
      msg.textContent = '배포 환경에서는 인증 API 주소(WETHUS_API_BASE) 설정이 필요합니다.';
    }

    const remembered = localStorage.getItem('wethus_saved_email') || '';
    if (remembered) {
      loginEmail.value = remembered;
      rememberEmail.checked = true;
    }

    function setTab(mode) {
      const isLogin = mode === 'login';
      tabLogin.classList.toggle('active', isLogin);
      tabSignup.classList.toggle('active', !isLogin);
      loginForm.style.display = isLogin ? 'grid' : 'none';
      signupForm.style.display = isLogin ? 'none' : 'grid';
      msg.textContent = '';
    }

    async function postWithFallback(endpoints, body) {
      if (!endpoints.length) throw new Error('인증 API 주소가 설정되지 않았습니다.');
      let lastErr = null;
      for (const endpoint of endpoints) {
        try {
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body || {})
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data?.error || `요청 실패 (${res.status})`);
          return data;
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr || new Error('백엔드 연결 실패');
    }

    async function handleGoogleCredential(response) {
      try {
        const credential = response?.credential;
        if (!credential) throw new Error('Google 인증 토큰이 비어 있습니다.');

        const data = await postWithFallback(GOOGLE_AUTH_ENDPOINTS, { credential });
        if (!data?.ok || !data?.user) throw new Error(data?.error || 'Google 사용자 정보를 불러오지 못했습니다.');

        const before = WETHUS.currentUser();
        const user = WETHUS.upsertCloudUser(data.user);
        const isNew = !before || before.email !== user.email;
        if (!user?.onboardingComplete || isNew) {
          location.href = 'profile.html?onboarding=1';
          return;
        }
        location.href = 'index.html';
      } catch (err) {
        const m = String(err?.message || '');
        if (/Failed to fetch/i.test(m)) {
          msg.textContent = '인증 서버 연결에 실패했습니다. 백엔드(8787) 실행 상태와 주소(127.0.0.1/localhost)를 확인해주세요.';
        } else {
          msg.textContent = m || 'Google 로그인 중 오류가 발생했습니다.';
        }
      }
    }

    let gsiInitialized = false;
    function initGoogleSignIn() {
      if (!GOOGLE_CLIENT_ID) {
        googleHint.textContent = 'Google 로그인은 아직 설정되지 않았습니다. (Client ID 필요)';
        return;
      }
      if (!(window.google && google.accounts && google.accounts.id)) {
        googleHint.textContent = 'Google 로그인 SDK 로딩 중입니다. 잠시 후 새로고침해주세요.';
        return;
      }
      if (gsiInitialized) return;
      gsiInitialized = true;
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleCredential,
        auto_select: false,
        cancel_on_tap_outside: true,
        use_fedcm_for_prompt: false
      });
      google.accounts.id.renderButton(document.getElementById('googleBtn'), {
        theme: 'outline',
        size: 'large',
        width: 320,
        text: 'signin_with'
      });
      googleHint.textContent = '';
    }

    function validateSignupForm() {
      if (!window.WETHUS) return false;
      const s = WETHUS.getState();
      const email = signupEmail.value.trim();
      const pw = signupPw.value;
      const pw2 = signupPwConfirm.value;

      let ok = true;

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
      if (!email) {
        emailHint.textContent = '';
        ok = false;
      } else if (!emailPattern.test(email)) {
        emailHint.textContent = '이메일 형식이 올바르지 않습니다.';
        ok = false;
      } else if (s.users.some(u => u.email === email)) {
        emailHint.textContent = '이미 가입된 이메일입니다.';
        ok = false;
      } else {
        emailHint.textContent = '사용 가능한 이메일입니다.';
      }

      if (!pw) {
        pwHint.textContent = '';
        ok = false;
      } else if (pw.length < 8 || !/[A-Za-z]/.test(pw) || !/[0-9]/.test(pw)) {
        pwHint.textContent = '비밀번호는 영문+숫자 포함 8자 이상이어야 합니다.';
        ok = false;
      } else {
        pwHint.textContent = '사용 가능한 비밀번호 형식입니다.';
      }

      if (!pw2) {
        pwConfirmHint.textContent = '';
        ok = false;
      } else if (pw !== pw2) {
        pwConfirmHint.textContent = '비밀번호 확인이 일치하지 않습니다.';
        ok = false;
      } else {
        pwConfirmHint.textContent = '비밀번호가 일치합니다.';
      }

      if (!agreeChk.checked) ok = false;

      signupSubmit.disabled = !ok;
      return ok;
    }

    tabLogin.addEventListener('click', () => setTab('login'));
    tabSignup.addEventListener('click', () => setTab('signup'));

    [signupEmail, signupPw, signupPwConfirm].forEach(el => {
      el.addEventListener('input', validateSignupForm);
      el.addEventListener('blur', validateSignupForm);
    });
    agreeChk.addEventListener('change', validateSignupForm);

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!window.WETHUS) return;
      const fd = new FormData(loginForm);
      const email = String(fd.get('email') || '').trim().toLowerCase();
      const password = String(fd.get('password') || '');
      try {
        const data = await postWithFallback(LOGIN_ENDPOINTS, { email, password });
        WETHUS.upsertCloudUser(data.user || {});
      } catch (err) {
        if (isLocalHost) {
          // 로컬 개발 환경에서만 폴백 허용
          WETHUS.loginUser({ email, password });
        } else {
          throw err;
        }
      }
      if (rememberEmail.checked) localStorage.setItem('wethus_saved_email', email);
      else localStorage.removeItem('wethus_saved_email');
      location.href = 'index.html';
    });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!window.WETHUS) return;
      if (!validateSignupForm()) {
        msg.textContent = '입력값을 다시 확인해주세요.';
        return;
      }
      const fd = new FormData(signupForm);
      const email = String(fd.get('email') || '').trim().toLowerCase();
      const payload = {
        name: fd.get('name'),
        nickname: fd.get('nickname'),
        email,
        password: fd.get('password')
      };
      try {
        const data = await postWithFallback(REGISTER_ENDPOINTS, payload);
        WETHUS.upsertCloudUser(data.user || {});
      } catch (err) {
        if (isLocalHost) {
          WETHUS.registerUser(payload);
        } else {
          throw err;
        }
      }
      location.href = 'profile.html?onboarding=1';
    });

    document.getElementById('devModeBtn').addEventListener('click', () => {
      if (!window.WETHUS) return;
      const p = prompt('개발자모드 비밀번호를 입력하세요');
      if (p === '0904') {
        WETHUS.setCurrentUser('dev-temp', true);
        msg.textContent = '개발자모드로 진입합니다...';
        setTimeout(() => { location.href = 'index.html'; }, 250);
      } else {
        msg.textContent = '비밀번호가 올바르지 않습니다.';
      }
    });

    window.addEventListener('load', () => {
      initGoogleSignIn();
    });
  </script>
</body>
</html>
