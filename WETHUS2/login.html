<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WETHUS | 로그인</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="nav"><div class="nav-inner"><a href="index.html" class="wordmark">WETHUS</a></div></header>
  <main class="auth-wrap">
    <section class="auth-card">
      <h1>로그인 / 회원 시작</h1>
      <p>개발 단계에서는 이메일 기반으로 간단히 시작합니다.</p>
      <form class="auth-form" id="authForm">
        <input name="name" placeholder="이름" required />
        <input name="email" type="email" placeholder="이메일" required />
        <input name="password" type="password" placeholder="비밀번호" required />
        <button class="btn btn--primary" type="submit">로그인</button>
      </form>
      <div class="dev-row">
        <button id="devModeBtn" class="btn btn--secondary" type="button">개발자모드</button>
        <span class="note">임시 비밀번호: 0904</span>
      </div>
      <p id="authMsg" class="form-message"></p>
    </section>
  </main>
  <script src="app.js"></script>
  <script>
    const form = document.getElementById('authForm');
    const msg = document.getElementById('authMsg');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      try {
        WETHUS.registerOrLogin({
          name: fd.get('name'),
          email: fd.get('email'),
          password: fd.get('password')
        });
        location.href = 'index.html';
      } catch (err) {
        msg.textContent = err.message;
      }
    });

    document.getElementById('devModeBtn').addEventListener('click', () => {
      const p = prompt('개발자모드 비밀번호를 입력하세요');
      if (p === '0904') {
        WETHUS.setCurrentUser('dev-temp', true);
        location.href = 'index.html';
      } else {
        msg.textContent = '비밀번호가 올바르지 않습니다.';
      }
    });
  </script>
</body>
</html>
